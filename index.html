<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#15171A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="くらしタスク">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>くらしタスク｜タスク&カレンダー</title>
<style>
:root{
  --ink:#15171A; --sub:#788091; --line:#E4E6EA; --line2:#F0F1F4;
  --bg:#FFFFFF; --bg2:#F7F8FA; --accent:#2456E6; --danger:#C9403C;
  --wait:#D98324; --done:#9AA1AD; --sat:#3D6FD8; --sun:#C9403C;
}
*{margin:0;padding:0;box-sizing:border-box;border-radius:0 !important;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:var(--ink);background:var(--bg);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:960px;margin:0 auto;min-height:100%;padding-bottom:76px;padding-top:max(env(safe-area-inset-top),6px);}
button{font-family:inherit;font-size:inherit;background:none;border:none;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg);border:1px solid var(--line);padding:9px 10px;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink);}
label{font-size:12px;color:var(--sub);letter-spacing:.06em;display:block;margin-bottom:4px;}

/* ===== view header ===== */
.vhead{display:flex;align-items:baseline;justify-content:space-between;padding:18px 16px 10px;border-bottom:1px solid var(--ink);}
.vhead h1{font-size:18px;font-weight:700;letter-spacing:.12em;}
.vhead .sub{font-size:12px;color:var(--sub);letter-spacing:.05em;}

/* ===== bottom nav ===== */
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--ink);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
#nav button{flex:1;padding:10px 0 8px;font-size:11px;letter-spacing:.08em;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px;}
#nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.6;}
#nav button.on{color:var(--ink);font-weight:700;}
#nav{max-width:960px;margin:0 auto;}

/* ===== chips ===== */
.chips{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;border-bottom:1px solid var(--line);scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;padding:5px 12px;border:1px solid var(--line);font-size:12.5px;letter-spacing:.04em;white-space:nowrap;color:var(--sub);display:flex;align-items:center;gap:6px;}
.chip .dot{width:8px;height:8px;display:inline-block;}
.chip.on{border-color:var(--ink);color:var(--ink);font-weight:600;}
.seg{display:flex;border:1px solid var(--line);margin:12px 16px 0;width:fit-content;}
.seg button{padding:6px 16px;font-size:12.5px;color:var(--sub);letter-spacing:.05em;}
.seg button.on{background:var(--ink);color:#fff;}

/* ===== sections ===== */
.sec{padding:0 0 4px;}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 6px;font-size:12px;letter-spacing:.14em;color:var(--sub);font-weight:600;}
.sec-h .act{color:var(--accent);font-size:12.5px;letter-spacing:.04em;}

/* ===== task items ===== */
.titem{display:flex;align-items:stretch;border-bottom:1px solid var(--line2);cursor:pointer;}
.titem .bar{width:4px;flex:0 0 4px;}
.titem .body{flex:1;padding:10px 10px 10px 12px;min-width:0;}
.titem .tt{font-size:15px;font-weight:500;display:flex;align-items:center;gap:6px;}
.titem .tt.done{color:var(--done);text-decoration:line-through;font-weight:400;}
.titem .meta{font-size:11.5px;color:var(--sub);display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;}
.titem .right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:5px;padding:8px 12px 8px 0;}
.badge{font-size:10.5px;letter-spacing:.06em;padding:2px 8px;border:1px solid var(--line);color:var(--sub);white-space:nowrap;}
.badge.todo{border-color:var(--line);}
.badge.doing{border-color:var(--accent);color:var(--accent);}
.badge.wait{border-color:var(--wait);color:var(--wait);background:#FBF3E6;font-weight:700;}
.badge.done{border-color:var(--line);color:var(--done);}
.pr1{color:var(--danger);font-weight:700;}
.pr3{color:var(--sub);}
.todayBtn{font-size:11px;padding:2px 8px;border:1px solid var(--line);color:var(--sub);white-space:nowrap;}
.todayBtn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.linkchips{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.linkchip{font-size:11px;padding:2px 9px;border:1px solid var(--line);color:var(--accent);display:flex;align-items:center;gap:4px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* quick add */
.qadd{display:flex;gap:0;padding:12px 16px;border-bottom:1px solid var(--line);}
.qadd input{border-right:none;flex:1;}
.qadd select{width:110px;border-right:none;font-size:13px;}
.qadd button{background:var(--ink);color:#fff;padding:0 18px;font-size:13px;letter-spacing:.1em;flex:0 0 auto;}

/* ===== today ===== */
.tdhead{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--line);gap:10px;}
.tdhead .date .d1{font-size:26px;font-weight:700;letter-spacing:.02em;}
.tdhead .date .d2{font-size:12px;color:var(--sub);letter-spacing:.08em;margin-top:2px;}
.tdhead .date .hol{color:var(--danger);}
.ring{position:relative;width:78px;height:78px;flex:0 0 78px;}
.ring svg{transform:rotate(-90deg);}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:17px;font-weight:700;}
.ring .pct span{font-size:9px;color:var(--sub);font-weight:400;letter-spacing:.1em;}
.timebar{padding:12px 16px;border-bottom:1px solid var(--line);}
.timebar .row{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px;align-items:center;flex-wrap:wrap;gap:2px 8px;}
.timebar .row b{color:var(--ink);font-size:13.5px;}
.timebar .nums{white-space:nowrap;}
.availEdit{margin-left:6px;}
.timebar .gauge{height:6px;background:var(--bg2);position:relative;}
.timebar .gauge i{position:absolute;top:0;bottom:0;left:0;background:var(--ink);}
.timebar .gauge i.over{background:var(--danger);}
.timebar .neg{color:var(--danger);font-weight:700;}
.availEdit{font-size:12.5px;color:var(--accent);}
.startBtn{display:block;width:calc(100% - 32px);margin:14px 16px 4px;background:var(--ink);color:#fff;padding:13px 0;font-size:15px;font-weight:700;letter-spacing:.2em;}
.startBtn:active{opacity:.8;}
.gmsg{padding:10px 16px 2px;font-size:13px;color:var(--sub);}

/* routine check row */
.ritem{display:flex;align-items:center;border-bottom:1px solid var(--line2);padding:9px 16px;gap:11px;}
.ritem .chk{width:22px;height:22px;border:1.5px solid var(--ink);flex:0 0 22px;display:flex;align-items:center;justify-content:center;}
.ritem.done .chk{background:var(--ink);}
.ritem .chk svg{width:14px;height:14px;stroke:#fff;stroke-width:2.5;fill:none;}
.ritem .rb{flex:1;min-width:0;}
.ritem .rt{font-size:14.5px;}
.ritem.done .rt{color:var(--done);text-decoration:line-through;}
.ritem .rm{font-size:11px;color:var(--sub);}
.slotTag{font-size:10px;letter-spacing:.1em;color:var(--sub);border:1px solid var(--line);padding:1px 6px;}

/* ===== calendar ===== */
.calbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);}
.calbar{gap:6px;}
.calbar .ym{font-size:16px;font-weight:700;letter-spacing:.03em;white-space:nowrap;flex:0 0 auto;}
.calmode button{padding:5px 10px;}
.calbar .mv{display:flex;gap:2px;}
.calbar .mv button{padding:5px 13px;border:1px solid var(--line);font-size:14px;}
.calmode{display:flex;border:1px solid var(--line);}
.calmode button{padding:5px 13px;font-size:12px;color:var(--sub);}
.calmode button.on{background:var(--ink);color:#fff;}
#calGrid{display:grid;grid-template-columns:repeat(7,1fr);}
.dow{font-size:10.5px;text-align:center;color:var(--sub);letter-spacing:.1em;padding:6px 0;border-bottom:1px solid var(--line);}
.cell{min-height:88px;border-bottom:1px solid var(--line2);border-right:1px solid var(--line2);padding:3px 3px 4px;position:relative;cursor:pointer;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;overflow:hidden;}
.cell:nth-child(7n){border-right:none;}
.cell.out{opacity:.35;}
.cell.today .dn{background:var(--ink);color:#fff;}
.cell .top{display:flex;align-items:center;gap:3px;}
.cell .dn{font-size:12.5px;font-weight:600;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.cell .dn.sat{color:var(--sat);} .cell .dn.sun{color:var(--sun);}
.cell .rk{font-size:8.5px;color:var(--sub);letter-spacing:0;}
.cell .rk.taian{color:var(--danger);}
.cell .ich{font-size:8.5px;color:#B8860B;}
.cell .holname{font-size:8.5px;color:var(--danger);line-height:1.2;padding-left:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cell .marks{display:flex;gap:2px;padding:1px 0 1px 2px;flex-wrap:wrap;}
.cell .marks svg{width:12px;height:12px;stroke-width:1.6;fill:none;}
.evbar{font-size:9.5px;line-height:1.5;padding:0 3px;margin-top:1px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.evbar.due{background:none !important;border:1px dashed var(--sub);color:var(--sub);}
.evmore{font-size:9px;color:var(--sub);padding-left:3px;}

/* week/day */
.wrow{display:flex;border-bottom:1px solid var(--line2);cursor:pointer;}
.wrow .wd{flex:0 0 74px;padding:10px 8px;border-right:1px solid var(--line2);text-align:center;}
.wrow .wd .n{font-size:17px;font-weight:700;}
.wrow .wd .r{font-size:9.5px;color:var(--sub);}
.wrow .wd .h{font-size:9.5px;color:var(--danger);}
.wrow .wbody{flex:1;padding:8px 12px;min-width:0;}
.wev{display:flex;gap:8px;font-size:13px;align-items:baseline;margin-bottom:3px;}
.wev .t{color:var(--sub);font-size:11.5px;flex:0 0 auto;}
.wev .c{width:8px;height:8px;flex:0 0 8px;align-self:center;}
.dayhead{padding:16px;border-bottom:1px solid var(--line);}
.dayhead .d1{font-size:22px;font-weight:700;}
.dayhead .d2{font-size:12px;color:var(--sub);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;}
.dayhead .hol{color:var(--danger);}
.addrow{display:flex;gap:8px;padding:12px 16px;}
.addrow button{flex:1;border:1px solid var(--ink);padding:9px 0;font-size:13px;letter-spacing:.1em;font-weight:600;}
.addrow button.fill{background:var(--ink);color:#fff;}

/* ===== modal ===== */
#modalWrap{position:fixed;inset:0;background:rgba(21,23,26,.45);z-index:100;display:none;align-items:flex-end;justify-content:center;}
#modalWrap.show{display:flex;}
#modal{background:var(--bg);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;padding:0 0 calc(16px + env(safe-area-inset-bottom));}
#modal .mh{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--ink);position:sticky;top:0;background:var(--bg);z-index:2;}
#modal .mh b{letter-spacing:.1em;font-size:15px;}
#modal .mh button{font-size:22px;line-height:1;color:var(--sub);padding:2px 6px;}
.mbody{padding:14px 16px;}
.frow{margin-bottom:12px;}
.f2{display:flex;gap:10px;}
.f2>div{flex:1;}
.mbtns{display:flex;gap:8px;padding:4px 16px 8px;}
.mbtns button{flex:1;padding:11px 0;font-size:13.5px;letter-spacing:.1em;border:1px solid var(--line);color:var(--sub);}
.mbtns .save{background:var(--ink);color:#fff;border-color:var(--ink);flex:2;font-weight:700;}
.mbtns .del{color:var(--danger);border-color:var(--danger);}
.daysel{display:flex;gap:4px;}
.daysel button{flex:1;padding:7px 0;border:1px solid var(--line);font-size:12.5px;color:var(--sub);}
.daysel button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.linkedit{border:1px solid var(--line2);padding:8px;margin-bottom:6px;display:flex;gap:6px;align-items:center;}
.linkedit input{padding:6px 8px;font-size:13px;}
.linkedit .lb{width:34%;}
.linkedit button{color:var(--danger);font-size:16px;padding:0 4px;}
.addlink{font-size:12.5px;color:var(--accent);padding:2px 0;}
.tmplchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tmplchips .chip{cursor:pointer;}
.colorsel{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
.colorsel.c6{grid-template-columns:repeat(6,1fr);}
.colorsel button{height:30px;border:2px solid transparent;}
.colorsel button.on{border-color:var(--ink);}
.icontabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.icontabs button{border:1px solid var(--line);padding:4px 10px;font-size:12px;color:var(--sub);}
.icontabs button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.icongrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.icongrid button{border:1px solid var(--line2);height:44px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
.icongrid button.on{border-color:var(--ink);background:var(--bg2);}
.icongrid svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.6;}
.gmark{display:inline-block;width:9px;height:9px;flex:0 0 9px;}
/* テンキー対応タイムピッカー */
.tp{display:flex;align-items:center;gap:2px;}
.tp-col{display:flex;flex-direction:column;align-items:center;}
.tp-col button{font-size:9px;color:var(--sub);padding:3px 12px;border:1px solid var(--line2);line-height:1;}
.tp-num{width:46px;text-align:center;font-size:16px;font-weight:600;padding:4px 2px;border:1px solid var(--line);margin:2px 0;}
.tp-sep{font-weight:700;padding:0 2px;color:var(--sub);}
.tp-clear{color:var(--sub);font-size:13px;padding:0 7px;align-self:center;}
.pinbadge{font-size:9.5px;border:1px solid var(--line);color:var(--sub);padding:1px 5px;letter-spacing:.05em;margin-left:4px;white-space:nowrap;}
.arrows{display:flex;flex-direction:column;gap:3px;justify-content:center;padding:0 8px 0 0;}
.arrows button{border:1px solid var(--line2);font-size:9px;line-height:1;padding:5px 7px;color:var(--sub);}
/* 4つの箱 */
.quadwrap{padding:10px 12px;}
.qhint{font-size:11.5px;color:var(--sub);padding:2px 4px 8px;line-height:1.6;}
.qtray{display:flex;gap:6px;flex-wrap:wrap;padding:0 4px 4px;}
.qchip{border:1px solid var(--line);padding:5px 10px;font-size:12px;display:flex;gap:6px;align-items:center;max-width:100%;}
.qchip .qt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qchip.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.qbox{border:1px solid var(--line);min-height:120px;padding-bottom:4px;}
.qbox.target{border-style:dashed;border-color:var(--ink);cursor:pointer;background:var(--bg2);}
.qbox .qh{font-size:10px;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;align-items:baseline;gap:4px;color:var(--sub);}
.qbox .qh b{font-size:12px;}
.qtask{display:flex;align-items:center;gap:5px;padding:6px 6px;border-bottom:1px solid var(--line2);font-size:12px;}
.qtask.sel{background:var(--ink);color:#fff;}
.qtask .qt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qtask button{font-size:10px;color:var(--sub);padding:1px 3px;}
.qtask.sel button{color:#fff;}
/* 連続4桁タイム入力 */
.tfrow{display:flex;align-items:center;}
.tf{width:96px;text-align:center;font-size:18px;font-weight:600;letter-spacing:.1em;}
.tf-clear{font-size:11px;color:var(--sub);border:1px solid var(--line);padding:8px 9px;margin-left:6px;white-space:nowrap;}
.rep{font-size:10.5px;color:var(--accent);border:1px solid var(--line);padding:1px 6px;}
/* ルーティン頻度ビルダー */
.nthbuild{border:1px solid var(--line2);padding:8px;}
.nthlist{display:flex;flex-wrap:wrap;gap:5px;}
.nthlist:empty{display:none;}
.nthlist .nc{border:1px solid var(--ink);padding:3px 4px 3px 9px;font-size:12.5px;display:flex;gap:4px;align-items:center;}
.nthlist .nc button{color:var(--danger);font-size:14px;padding:0 3px;}
.nthadd{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;}
.nthadd select{width:auto;padding:7px 8px;}
.wdsel{display:flex;gap:3px;}
.wdsel button{width:30px;padding:7px 0;border:1px solid var(--line);font-size:12px;color:var(--sub);}
.wdsel button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.inlineadd{font-size:12px;color:var(--accent);border:1px solid var(--line);padding:9px 10px;white-space:nowrap;}
/* 月ALL全表示 */
.allbadge{font-size:8px;color:#fff;background:var(--sub);padding:0 3px;margin-left:3px;vertical-align:middle;letter-spacing:.05em;}
.calmode button.on .allbadge{background:#fff;color:var(--ink);}
.evtime{font-size:8px;opacity:.9;margin-right:2px;font-variant-numeric:tabular-nums;}
.evfrac{display:inline-flex;flex-direction:column;line-height:.82;font-size:6.5px;vertical-align:middle;margin-right:2px;text-align:center;font-variant-numeric:tabular-nums;opacity:.85;}
.nightglyph{margin-right:1px;}
.rtag{font-size:9.5px;border:1px solid var(--line);color:var(--sub);padding:1px 5px;margin-left:2px;vertical-align:middle;}
.ritem .rb{cursor:pointer;}
.nightsep.am{color:#B07D12;background:#FAF5E6;}
.nightsep.pm{color:#A96A1A;background:#FAF1E2;}
.wrow.wtoday{background:#EEF2FF;}
.wtodaytag{font-size:9px;color:#2456E6;font-weight:700;margin-top:2px;}
.cell.shade{background-image:repeating-linear-gradient(45deg,transparent 0 5px,rgba(0,0,0,.05) 5px 6px);}
/* 日ビュー 2カラム（左=予定 / 右=タスク） */
.daycols{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--ink);}
.daycol{border-right:1px solid var(--line2);min-width:0;}
.daycol:last-child{border-right:none;}
.dch{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;font-size:12px;letter-spacing:.1em;color:var(--sub);border-bottom:1px solid var(--line);}
.dch b{color:var(--ink);font-size:12.5px;}
.dch button{border:1px solid var(--line);width:26px;height:26px;font-size:16px;color:var(--ink);}
.tl{display:flex;gap:7px;padding:9px 9px;border-bottom:1px solid var(--line2);cursor:pointer;}
.tl .tlt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;flex:0 0 40px;}
.tl .tlt small{display:block;font-size:9px;color:var(--sub);font-weight:400;}
.tl .tlbar{width:3px;flex:0 0 3px;}
.tl .tlb{flex:1;min-width:0;}
.tl .tlname{font-size:13px;word-break:break-word;line-height:1.4;}
.tl .tlg{font-size:10px;color:var(--sub);}
.nightsep{font-size:10px;letter-spacing:.15em;color:#5457A6;background:#F1F1F9;padding:3px 10px;border-bottom:1px solid var(--line2);}
.dtask{display:flex;gap:7px;padding:9px 9px;border-bottom:1px solid var(--line2);align-items:flex-start;}
.dtask .cb{width:20px;height:20px;border:1.5px solid var(--ink);flex:0 0 20px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;}
.dtask.done .cb{background:var(--ink);}
.dtask .cb svg{width:13px;height:13px;stroke:#fff;stroke-width:2.5;fill:none;}
.dtask .dtb{flex:1;min-width:0;cursor:pointer;}
.dtask .dtn{font-size:13px;word-break:break-word;line-height:1.4;}
.dtask.done .dtn{text-decoration:line-through;color:var(--done);}
.dtask .dtm{font-size:10px;color:var(--sub);}
.dempty{padding:14px 10px;color:var(--line);font-size:12px;text-align:center;}
/* 設定 階層メニュー */

#flow{position:fixed;inset:0;background:var(--ink);color:#fff;z-index:200;display:none;flex-direction:column;padding:calc(20px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));}

.burst{position:fixed;font-size:22px;z-index:300;pointer-events:none;animation:burst 1.2s ease-out forwards;}
@keyframes burst{0%{transform:translateY(0) scale(.6);opacity:1;}100%{transform:translateY(-140px) scale(1.3);opacity:0;}}

const RAD=Math.PI/180;

function newMoonJDE(k){const T=k/1236.85;
  let jde=2451550.09766+29.530588861*k+0.00015437*T*T;
  const E=1-0.002516*T;
  const M=(2.5534+29.10535670*k)*RAD, Mp=(201.5643+385.81693528*k)*RAD, F=(160.7108+390.67050284*k)*RAD, Om=(124.7746-1.56375588*k)*RAD;
  jde+= -0.40720*Math.sin(Mp)+0.17241*E*Math.sin(M)+0.01608*Math.sin(2*Mp)+0.01039*Math.sin(2*F)
    +0.00739*E*Math.sin(Mp-M)-0.00514*E*Math.sin(Mp+M)+0.00208*E*E*Math.sin(2*M)
    -0.00111*Math.sin(Mp-2*F)-0.00057*Math.sin(Mp+2*F)+0.00056*E*Math.sin(2*Mp+M)
    -0.00042*Math.sin(3*Mp)+0.00042*E*Math.sin(M+2*F)+0.00038*E*Math.sin(M-2*F)
    -0.00024*E*Math.sin(2*Mp-M)-0.00017*Math.sin(Om);
  return jde;}
const nmJdnCache={};
function newMoonJdnJST(k){if(nmJdnCache[k]===undefined)nmJdnCache[k]=Math.floor(newMoonJDE(k)+9/24+0.5);return nmJdnCache[k];}
function latestNewMoonK(jdn){let k=Math.floor((jdn-2451550)/29.5305888);

  for(let j=a;j<b;j++){const l2=sunLongAtMidnightJST(j+1);

  for(let i=0;i<4;i++){m=chukiOfLunation(kk);if(m)break;kk--;} // 閏月は前月の数字

const ICHIRYU={1:[1,6],2:[9,2],3:[0,3],4:[3,4],5:[5,6],6:[9,6],7:[0,7],8:[3,8],9:[9,6],10:[9,10],11:[11,0],12:[3,0]};

const holCache={};
function holidaysOf(y){
  if(holCache[y])return holCache[y];
  const H={};const add=(m,d,n)=>H[m+'-'+d]=n;
  const nthMon=(m,n)=>{const f=new Date(y,m-1,1).getDay();return 1+((8-f)%7)+(n-1)*7;};
  add(1,1,'元日');add(1,nthMon(1,2),'成人の日');add(2,11,'建国記念の日');add(2,23,'天皇誕生日');
  add(3,Math.floor(20.8431+0.242194*(y-1980)-Math.floor((y-1980)/4)),'春分の日');
  add(4,29,'昭和の日');add(5,3,'憲法記念日');add(5,4,'みどりの日');add(5,5,'こどもの日');

  add(9,Math.floor(23.2488+0.242194*(y-1980)-Math.floor((y-1980)/4)),'秋分の日');
  add(10,nthMon(10,2),'スポーツの日');add(11,3,'文化の日');add(11,23,'勤労感謝の日');

    if(new Date(y,m-1,d).getDay()===0){let dt=new Date(y,m-1,d+1);
      while(H[(dt.getMonth()+1)+'-'+dt.getDate()])dt=new Date(y,dt.getMonth(),dt.getDate()+1);
      H[(dt.getMonth()+1)+'-'+dt.getDate()]='振替休日';}});
  // 国民の休日（敬老の日と秋分の日の間など）
  for(let m=1;m<=12;m++)for(let d=2;d<=30;d++){
    if(!H[m+'-'+d]&&H[m+'-'+(d-1)]&&H[m+'-'+(d+1)]&&new Date(y,m-1,d).getDay()!==0)H[m+'-'+d]='国民の休日';}

function renderToday(){

  const doneR=routines.filter(r=>log.routines[r.id]?.done).length;

  <div class="timebar">

    <div class="gauge"><i class="${restMin>avail?'over':''}" style="width:${avail?Math.min(100,restMin/avail*100):0}%"></i></div>
    <div class="row" style="margin:7px 0 0;"><span>${dayLog(t).startAt?`活動開始 <b>${dayLog(t).startAt}</b>・`:`起床 <b>${dayWake(t)}</b>・`}就寝 <b>${daySleep(t)}</b><button class="availEdit" onclick="editDayTimes()">変更</button></span>
      ${bed>0?`<span class="nums">就寝まで ${fmtMin(bed)}</span>`:''}</div>
  </div>
  <div class="addrow" style="padding:12px 16px 0;">

    ${carry.map(x=>taskRow(x)).join('')}</div>`:''}
  <div class="sec"><div class="sec-h">今日やること（ルーティン＋タスク・${doneR+doneT}/${routines.length+tasks.length}）

      <input id="qaToday" placeholder="今日のタスクをすぐ追加" onkeydown="if(event.key==='Enter'&&!event.isComposing)quickAddToday()">

function snoozeTask(id){const x=S.tasks.find(t=>t.id===id);if(!x)return;

function moveToday(id,dir){const t=todayStr();const list=todayTasks(t).sort(byToday);

function quickAddToday(){const inp=$('#qaToday');const v=inp.value.trim();if(!v)return;

function carryAll(){const t=todayStr();S.tasks.forEach(x=>{if(x.today&&x.today<t&&x.status!=='done')x.today=t;});save();render();}
function toggleRoutine(id){const t=todayStr();const log=dayLog(t);
  const cur=log.routines[id]?.done;log.routines[id]={...(log.routines[id]||{}),done:!cur};
  save();render();checkCelebrate();}
function checkCelebrate(){const t=todayStr();const log=dayLog(t);
  const rs=todaysRoutines(t),ts=S.tasks.filter(x=>x.today===t);
  const total=rs.length+ts.length;if(!total)return;
  const done=rs.filter(r=>log.routines[r.id]?.done).length+ts.filter(x=>x.status==='done').length;

function celebrate(){const em=['🎉','✨','🌸','⭐','💮','🎊'];
  for(let i=0;i<16;i++){const s=document.createElement('span');s.className='burst';
    s.textContent=em[i%em.length];s.style.left=(10+Math.random()*80)+'vw';s.style.top=(30+Math.random()*40)+'vh';
    s.style.animationDelay=(Math.random()*.5)+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),1800);}}
/* 今日やること：ルーティン＋タスクを1つの並び替え可能リストに（順番はその日ごとに保存） */
function doItems(t){
  const rts=todaysRoutines(t),tks=todayTasks(t);
  const pool=new Map();
  rts.forEach(r=>pool.set('r_'+r.id,{type:'r',obj:r}));
  tks.forEach(x=>pool.set('t_'+x.id,{type:'t',obj:x}));
  const order=dayLog(t).doOrder||[];
  const res=[],seen=new Set();
  order.forEach(k=>{if(pool.has(k)){res.push(pool.get(k));seen.add(k);}});
  const rank=it=>it.type==='r'?({morning:0,day:1,night:2,any:3}[it.obj.slot]||0):10+(it.obj.priority||2);
  [...pool.keys()].filter(k=>!seen.has(k)).map(k=>pool.get(k)).sort((a,b)=>rank(a)-rank(b)).forEach(it=>res.push(it));
  return res;}
function moveDoItem(tok,dir){const t=todayStr();
  const toks=doItems(t).map(it=>it.type+'_'+it.obj.id);
  const i=toks.indexOf(tok),j=i+dir;if(i<0||j<0||j>=toks.length)return;
  [toks[i],toks[j]]=[toks[j],toks[i]];dayLog(t).doOrder=toks;save();render();}
function todayArrows(tok){return `<div class="arrows">
  <button onclick="event.stopPropagation();moveDoItem('${tok}',-1)">▲</button>
  <button onclick="event.stopPropagation();moveDoItem('${tok}',1)">▼</button>
  <button onclick="event.stopPropagation();moveDoItemBottom('${tok}')" title="後回し">⤓</button></div>`;}
function doItemRow(it,t){
  const tok=it.type+'_'+it.obj.id;
  const arrows=todayArrows(tok);
  if(it.type==='r'){const r=it.obj;const dn=dayLog(t).routines[r.id]?.done;const st=r.stats||{n:0,total:0};
    return `<div class="ritem ${dn?'done':''}">
      <div class="chk" onclick="event.stopPropagation();toggleRoutine('${r.id}')">${dn?'<svg viewBox="0 0 24 24"><path d="M4 12l5 5 11-11"/></svg>':''}</div>
      <div class="rb" onclick="routineModal('${r.id}')"><div class="rt">${esc(r.title)} <span class="rtag">ルーティン</span></div>
      <div class="rm">${SLOTS[r.slot]}・目安${fmtMin(r.estMin)}${st.n?'・平均'+fmtMin(st.total/st.n/60):''}</div>${linkChips(r.links)}</div>
      ${arrows}</div>`;}
  return taskRow(it.obj,{today:true,arrowsTok:tok});}
function moveDoItemBottom(tok){const t=todayStr();const toks=doItems(t).map(it=>it.type+'_'+it.obj.id);
  const i=toks.indexOf(tok);if(i<0)return;toks.splice(i,1);toks.push(tok);dayLog(t).doOrder=toks;save();render();}
/* ===== 今日のルーティンを組む（パターン保存・適用） ===== */

/* ========================= タスク ========================= */
function taskRow(x,o={}){
  const todayBtn=x.pin
    ?(o.today?`<button class="todayBtn" onclick="event.stopPropagation();snoozeTask('${x.id}')">今日は隠す</button>`
             :`<span class="pinbadge">毎日</span>`)
    :`<button class="todayBtn ${x.today===todayStr()?'on':''}" onclick="event.stopPropagation();toggleToday('${x.id}')">☀ 今日</button>`;
  const arrows=o.arrowsTok?todayArrows(o.arrowsTok)
    :o.arrows?`<div class="arrows"><button onclick="event.stopPropagation();moveToday('${x.id}',-1)">▲</button><button onclick="event.stopPropagation();moveToday('${x.id}',1)">▼</button></div>`:'';
  return `<div class="titem" onclick="taskModal('${x.id}')">
    <div class="bar" style="${markCss(x.groupId,180)}"></div>
    <div class="body">
      <div class="tt ${x.status==='done'?'done':''}">${x.priority===1?'<span class="pr1">!</span>':''}${esc(x.title)}${x.pin&&o.today?'<span class="pinbadge">毎日</span>':''}</div>
      <div class="meta"><span class="gmark" style="${markCss(x.groupId)}"></span><span>${esc(groupPath(x.groupId))}</span>
        ${x.estMin?`<span>${fmtMin(x.estMin)}</span>`:''}
        ${x.due?`<span>期限 ${fmtDateJa(x.due)}</span>`:''}
        ${x.quad?`<span style="color:${QUADS[x.quad-1].c};">■${QUADS[x.quad-1].t}</span>`:''}
        ${x.status==='wait'&&x.waitNote?`<span style="color:var(--wait);">${esc(x.waitNote)}</span>`:''}</div>
      ${linkChips(x.links)}
    </div>
    <div class="right">
      <button class="badge ${x.status}" onclick="event.stopPropagation();cycleStatus('${x.id}')">${STATUS[x.status]}</button>
      ${todayBtn}
    </div>${arrows}</div>`;}
function cycleStatus(id){const x=S.tasks.find(t=>t.id===id);if(!x)return;
  const seq=['todo','doing','wait','done'];x.status=seq[(seq.indexOf(x.status)+1)%4];
  if(x.status==='done'){x.doneAt=todayStr();}save();render();checkCelebrate();}
function toggleToday(id){const x=S.tasks.find(t=>t.id===id);if(!x)return;
  x.today=x.today===todayStr()?null:todayStr();save();render();}
function visibleGroups(sel){ // 選択グループ＋その子孫
  if(!sel.size)return null;
  const ids=new Set();
  const addKids=id=>{ids.add(id);S.groups.filter(g=>g.parentId===id).forEach(g=>addKids(g.id));};
  sel.forEach(addKids);return ids;}
function groupChipsHtml(sel,fn){
  const roots=S.groups.filter(g=>!g.parentId);
  const flat=[];const walk=(g,dep)=>{flat.push({g,dep});S.groups.filter(x=>x.parentId===g.id).forEach(c=>walk(c,dep+1));};
  roots.forEach(g=>walk(g,0));
  return `<div class="chips"><button class="chip ${!sel.size?'on':''}" onclick="${fn}('')">全体</button>
    ${flat.map(({g,dep})=>`<button class="chip ${sel.has(g.id)?'on':''}" onclick="${fn}('${g.id}')">
      <span class="dot" style="${markCss(g.id)}"></span>${'▸'.repeat(dep)}${esc(g.name)}</button>`).join('')}</div>`;}
function tglTaskSel(id){if(!id)taskSel.clear();else taskSel.has(id)?taskSel.delete(id):taskSel.add(id);render();}
function tglCalSel(id){if(!id)calSel.clear();else calSel.has(id)?calSel.delete(id):calSel.add(id);render();attachCellPress();}
function setTaskSort(s){taskSort=s;render();}

  let body='';
  if(taskSort==='pr'){body=open.sort(sortFn).map(x=>taskRow(x)).join('');}
  else if(taskSort==='grp'){const gs=S.groups.filter(g=>!ids||ids.has(g.id));
    body=gs.map(g=>{const ts=open.filter(x=>x.groupId===g.id).sort(sortFn);
      return ts.length?`<div class="sec-h"><span class="gmark" style="${markCss(g.id)}"></span>　${esc(groupPath(g.id))}（${ts.length}）</div>${ts.map(x=>taskRow(x)).join('')}`:'';}).join('');}
  else{ // 4つの箱（重要×緊急マトリクス）
    const un=open.filter(x=>!x.quad);
    body=`<div class="quadwrap">
      <div class="qhint">タスクをタップして選択 → 入れたい箱をタップ（★投げ入れ）。▲▼で箱の中の順番を変更。この順番は「今日」の並びにも反映されます。</div>
      <div class="qtray">${un.length?un.map(x=>`<button class="qchip ${qSel===x.id?'sel':''}" onclick="qTap('${x.id}')">
        <span class="gmark" style="${markCss(x.groupId)}"></span><span class="qt">${esc(x.title)}</span></button>`).join('')
        :'<span class="qhint">未分類のタスクはありません</span>'}</div>
      <div class="qgrid">${QUADS.map((q,i)=>{
        const list=open.filter(x=>x.quad===i+1).sort((a,b)=>a.qOrder-b.qOrder);
        return `<div class="qbox ${qSel?'target':''}" onclick="if(qSel)assignQuad(${i+1})">
          <div class="qh" style="color:${q.c};"><b>${q.t}</b><span>${q.s}・${list.length}</span></div>
          ${list.map(x=>`<div class="qtask ${qSel===x.id?'sel':''}" onclick="event.stopPropagation();qTap('${x.id}')">
            <span class="gmark" style="${markCss(x.groupId)}"></span><span class="qt">${esc(x.title)}</span>
            <button onclick="event.stopPropagation();moveQ('${x.id}',-1)">▲</button>
            <button onclick="event.stopPropagation();moveQ('${x.id}',1)">▼</button>
            <button onclick="event.stopPropagation();unQuad('${x.id}')">✕</button></div>`).join('')}

function qTap(id){qSel=qSel===id?null:id;render();}
function assignQuad(q){const x=S.tasks.find(t=>t.id===qSel);if(!x)return;
  x.quad=q;x.qOrder=Math.max(0,...S.tasks.filter(t=>t.quad===q&&t.id!==x.id).map(t=>t.qOrder+1));
  qSel=null;save();render();}
function unQuad(id){const x=S.tasks.find(t=>t.id===id);if(!x)return;x.quad=0;save();render();}
function moveQ(id,dir){const x=S.tasks.find(t=>t.id===id);if(!x)return;
  const list=S.tasks.filter(t=>t.quad===x.quad&&t.status!=='done').sort((a,b)=>a.qOrder-b.qOrder);
  list.forEach((t,i)=>t.qOrder=i);
  const i=list.findIndex(t=>t.id===id),j=i+dir;
  if(j<0||j>=list.length)return;
  list[i].qOrder=j;list[j].qOrder=i;save();render();}

function saveTask(id){

function calNav(n){if(calMode==='month'){calX+=n;if(calX<0){calX=11;calY--;}if(calX>11){calX=0;calY++;}}
  else{const d=parseDs(calDate);d.setDate(d.getDate()+(calMode==='week'?7*n:n));calDate=dsOf(d);calY=d.getFullYear();calX=d.getMonth();}

function isNight(e){return !!(e.start&&S.settings.showNight&&e.start>=S.settings.nightStart);}
/* 時間帯（午前/午後/夜）。夜は「夜の開始〜翌日の起床まで」 */
function bandOf(t,wake){
  if(!t)return 'am';
  const m=hm2min(t),w=hm2min(wake||S.settings.wakeDef),p=hm2min(S.settings.pmStart),n=hm2min(S.settings.nightStart);
  if(m>=n||m<w)return 'night';
  if(m>=p)return 'pm';
  return 'am';}
function bandLabel(b){return b==='night'?`🌙 夜（${S.settings.nightStart}〜）`:b==='pm'?`🌤 午後（${S.settings.pmStart}〜）`:'☀ 午前';}
/* 昼＝山吹色 / 夜＝紫（予定の左端で昼夜を色分け） */
const DAY_COLOR='#E6A21C',NIGHT_COLOR='#7B5EC7';
function dnColor(startOrEvent){const t=typeof startOrEvent==='string'?startOrEvent:startOrEvent&&startOrEvent.start;
  if(!S.settings.showNight||!t)return '';return bandOf(t)==='night'?NIGHT_COLOR:DAY_COLOR;}
/* 起床起点の分（起床前の早朝は前日夜の続きとして最後に並べる） */
function dayMin(t,wake){if(!t)return -1;const m=hm2min(t),w=hm2min(wake||S.settings.wakeDef);return m<w?m+1440:m;}
/* 予定を午前/午後/夜の区切り付きタイムラインで表示（日ビュー・今日で共用） */
function scheduleListHtml(evs,wake){
  const sorted=[...evs].sort((a,b)=>dayMin(a.start,wake)-dayMin(b.start,wake));
  let cur=null,html='';
  sorted.forEach(e=>{const b=bandOf(e.start,wake);
    if(S.settings.showNight&&b!==cur){cur=b;html+=`<div class="nightsep ${b}">${bandLabel(b)}</div>`;}
    const dn=dnColor(e)||group(e.groupId).color;
    html+=`<div class="tl" onclick="eventModal('${e.id}')">
      <div class="tlt">${e.start||'終日'}${e.end?`<small>〜${e.end}</small>`:''}</div>
      <div class="tlbar" style="background:${dn}"></div>
      <div class="tlb"><div class="tlname">${esc(evTitle(e))} ${repTag(e)}</div>
      <div class="tlg"><span class="gmark" style="${markCss(e.groupId)}"></span> ${esc(group(e.groupId).name)}${e.memo?' ・'+esc(e.memo):''}</div>${linkChips(e.links)}</div></div>`;});

/* 長押し→色（タップでは発動しない。移動・スクロール・指を離すと確実にキャンセル） */
let pressTimer=null,pressStart=null,pressFired=false,pressCell=null,pressDocBound=false;
function endPressTimer(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}}
function attachCellPress(){
  if(!pressDocBound){pressDocBound=true;
    document.addEventListener('pointermove',e=>{
      if(!pressTimer||!pressStart)return;
      if(Math.abs(e.clientX-pressStart[0])>10||Math.abs(e.clientY-pressStart[1])>10)endPressTimer();
    },{passive:true});
    document.addEventListener('pointerup',()=>{
      const had=!!pressTimer;endPressTimer();
      if(had&&pressCell&&!pressFired)calGoto(pressCell.dataset.d);
      pressCell=null;pressFired=false;pressStart=null;});
    document.addEventListener('pointercancel',()=>{endPressTimer();pressCell=null;pressFired=false;pressStart=null;});
    window.addEventListener('scroll',()=>endPressTimer(),{passive:true});
  }
  $$('.cell').forEach(el=>{
    el.addEventListener('contextmenu',e=>e.preventDefault());
    el.addEventListener('pointerdown',e=>{
      if(e.pointerType==='mouse'&&e.button!==0)return;
      endPressTimer();pressFired=false;pressCell=el;pressStart=[e.clientX,e.clientY];
      pressTimer=setTimeout(()=>{pressTimer=null;pressFired=true;
        try{navigator.vibrate&&navigator.vibrate(30);}catch(_){}
        openColorSheet(el.dataset.d);},600);
    });
  });}
function openColorSheet(dstr){
  const sheet=$('#colorSheet');
  sheet.innerHTML=`<div class="t">${fmtDateJa(dstr)} の色分け</div><div class="sw">
    ${PASTELS.map((p,i)=>`<button style="background:${p.c}" onclick="setDayColor('${dstr}',${i})">${p.n}</button>`).join('')}
    <button class="clear" onclick="setDayColor('${dstr}',null)">なし</button></div>`;
  sheet.classList.add('show');
  const close=e=>{if(!sheet.contains(e.target)){sheet.classList.remove('show');document.removeEventListener('pointerdown',close);}};
  setTimeout(()=>document.addEventListener('pointerdown',close),50);}
function setDayColor(d,i){if(i===null)delete S.dayColors[d];else S.dayColors[d]=i;
  save();$('#colorSheet').classList.remove('show');render();attachCellPress();}

function emDowUpd(){const v=$('#emDate')?.value;const el=$('#emDow');if(!el)return;
  if(!v){el.textContent='';return;}
  const d=parseDs(v);let s='（'+WD[d.getDay()]+'）';
  const rep=$('#emRepeat')?.value;
  if(rep==='weekly')s+=' 毎週'+WD[d.getDay()]+'曜';
  else if(rep==='biweekly')s+=' 隔週'+WD[d.getDay()]+'曜';
  else if(rep==='monthly')s+=' 毎月'+d.getDate()+'日';
  el.textContent=s;}
function applyTmpl(tid){const t=S.templates.find(x=>x.id===tid);if(!t)return;
  $('#emTitle').value=t.title||'';$('#emGroup').value=t.groupId;setTf('emStart',t.start||'');setTf('emEnd',t.end||'');$('#emMemo').value=t.memo||'';
  editLinks=(t.links||[]).map(l=>({...l}));refreshLinksEd();}
function manageTmpl(){
  openModal(`<div class="mh"><b>よく使う予定の管理</b><button onclick="closeModal()">✕</button></div>
  <div class="mbody">${S.templates.length?S.templates.map(t=>`

  </div>`);}
async function delTmpl(id){if(!await uiConfirm('このテンプレを削除しますか？','削除'))return;
  S.templates=S.templates.filter(t=>t.id!==id);save();manageTmpl();}
function saveEvent(id){
  const date=$('#emDate').value;if(!date){uiAlert('日付を選んでください');return;}
  const data={title:$('#emTitle').value.trim(),date,groupId:$('#emGroup').value,repeat:$('#emRepeat').value,
    start:$('#emStart').value,end:$('#emEnd').value,memo:$('#emMemo').value,links:collectLinks()};
  if(id)Object.assign(S.events.find(e=>e.id===id),data);
  else S.events.push({id:uid(),...data});
  if($('#emTmpl').checked)S.templates.push({id:uid(),title:data.title,groupId:data.groupId,start:data.start,end:data.end,memo:data.memo,links:data.links});
  save();closeModal();render();attachCellPress();}
async function delEvent(id){if(!await uiConfirm('この予定を削除しますか？','削除'))return;
  S.events=S.events.filter(e=>e.id!==id);save();closeModal();render();attachCellPress();}
function dupEvent(id){const e=S.events.find(v=>v.id===id);if(!e)return;
  S.events.push({...JSON.parse(JSON.stringify(e)),id:uid(),title:e.title+'（コピー）'});
  save();closeModal();render();attachCellPress();}

/* ========================= ルーティン ========================= */
function renderRoutines(){
  const order={morning:0,day:1,night:2,any:3};
  const list=[...S.routines].sort((a,b)=>order[a.slot]-order[b.slot]||a.order-b.order);
  let cur='';
  return `<div class="vhead"><h1>ルーティン</h1><button class="act" style="color:var(--accent);font-size:13px;" onclick="routineModal(null)">＋ 追加</button></div>
  <div class="mini">毎週の曜日、または毎月「第2水曜」などで登録できます（複数可）。「今日」に自動で並び、実行時間の平均も記録されます。▲▼で並び替えできます。</div>
  ${list.map(r=>{const h=r.slot!==cur?`<div class="sec-h">${SLOTS[r.slot]}</div>`:'';cur=r.slot;
    const st=r.stats||{n:0,total:0};
    return h+`<div class="titem" onclick="routineModal('${r.id}')">
      <div class="bar" style="background:${r.active?'var(--ink)':'var(--line)'}"></div>
      <div class="body"><div class="tt" style="${r.active?'':'color:var(--done);'}">${esc(r.title)}</div>
      <div class="meta"><span>${esc(scheduleText(r))}</span><span>目安${fmtMin(r.estMin)}</span>
      ${st.n?`<span>平均 ${fmtMin(st.total/st.n/60)}（${st.n}回）</span>`:''}${r.active?'':'<span>停止中</span>'}</div>
      ${linkChips(r.links)}</div>
      <div class="arrows"><button onclick="event.stopPropagation();moveRoutine('${r.id}',-1)">▲</button>
      <button onclick="event.stopPropagation();moveRoutine('${r.id}',1)">▼</button></div></div>`;}).join('')}`;
}

  const days=r&&r.days?[...r.days]:[0,1,2,3,4,5,6];
  window._rdays=days;window._rnths=r&&r.nths?JSON.parse(JSON.stringify(r.nths)):[];window._rnthWd=null;
  openModal(`<div class="mh"><b>${r?'ルーティン編集':'ルーティン追加'}</b><button onclick="closeModal()">✕</button></div>
  <div class="mbody">
    <div class="frow"><label>名前</label><input id="rmTitle" value="${esc(r?.title||'')}"></div>
    <div class="frow f2"><div><label>時間帯</label><select id="rmSlot">${Object.entries(SLOTS).map(([k,v])=>`<option value="${k}" ${r?.slot===k?'selected':''}>${v}</option>`).join('')}</select></div>
      <div><label>目安時間（分）</label><input id="rmEst" type="number" inputmode="numeric" min="0" value="${r?.estMin??15}"></div></div>
    <div class="frow"><label>繰り返し</label>
      <select id="rmFreq" onchange="rSetFreq(this.value)">
        <option value="weekly" ${(r?.freq||'weekly')==='weekly'?'selected':''}>毎週（曜日で指定）</option>
        <option value="monthly" ${r?.freq==='monthly'?'selected':''}>毎月（第◯曜で指定・複数可）</option></select></div>
    <div class="frow" id="rmWeeklyRow" style="display:${(r?.freq||'weekly')==='weekly'?'block':'none'};"><label>実行する曜日</label><div class="daysel" id="rmDays">
      ${WD.map((w,i)=>`<button class="${days.includes(i)?'on':''}" onclick="tglRDay(${i},this)">${w}</button>`).join('')}</div></div>
    <div class="frow" id="rmMonthlyRow" style="display:${r?.freq==='monthly'?'block':'none'};"><label>毎月の実行日（第◯曜・複数追加できます）</label>
      <div class="nthbuild">
        <div class="nthlist" id="rmNthList"></div>
        <div class="nthadd">
          <select id="rmNthN"><option value="1">第1</option><option value="2">第2</option><option value="3">第3</option><option value="4">第4</option><option value="5">第5</option><option value="-1">最終</option></select>
          <div class="wdsel" id="rmNthWd">${WD.map((w,i)=>`<button type="button" data-d="${i}" onclick="rWdPick(${i})">${w}</button>`).join('')}</div>
          <button type="button" class="inlineadd" onclick="rAddNth()">＋追加</button>
        </div></div></div>
    <div class="frow" style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="rmActive" style="width:auto;" ${!r||r.active?'checked':''}>
      <span style="font-size:13px;">有効（今日のリストに表示する）</span></div>
    <div class="frow"><label>リンク（開くサイト・マニュアル等）</label>${linksEditorHtml()}</div>
    ${r?.stats?.n?`<div class="mini" style="padding:0;">これまで${r.stats.n}回実行・平均${fmtMin(r.stats.total/r.stats.n/60)}</div>`:''}
  </div>
  <div class="mbtns">
    ${r?`<button class="del" onclick="delRoutine('${r.id}')">削除</button><button onclick="dupRoutine('${r.id}')">複製</button>`:''}
    <button class="save" onclick="saveRoutine('${r?.id||''}')">保存</button>
  </div>`);rNthRefresh();}
function tglRDay(i,btn){const d=window._rdays;const p=d.indexOf(i);p>=0?d.splice(p,1):d.push(i);btn.classList.toggle('on');}
function rSetFreq(v){$('#rmWeeklyRow').style.display=v==='weekly'?'block':'none';$('#rmMonthlyRow').style.display=v==='monthly'?'block':'none';}
function rWdPick(i){window._rnthWd=i;$$('#rmNthWd button').forEach(b=>b.classList.toggle('on',+b.dataset.d===i));}
function rAddNth(){if(window._rnthWd===null){uiAlert('曜日を選んでください');return;}
  const n=+$('#rmNthN').value,d=window._rnthWd;
  if(!window._rnths.some(o=>o.n===n&&o.d===d))window._rnths.push({n,d});
  window._rnthWd=null;$$('#rmNthWd button').forEach(b=>b.classList.remove('on'));rNthRefresh();}
function rDelNth(i){window._rnths.splice(i,1);rNthRefresh();}
function rNthRefresh(){const el=$('#rmNthList');if(!el)return;
  el.innerHTML=window._rnths.map((o,i)=>`<span class="nc">${nthLabel(o)}<button type="button" onclick="rDelNth(${i})">✕</button></span>`).join('');}
function moveRoutine(id,dir){const r=S.routines.find(x=>x.id===id);if(!r)return;
  const list=S.routines.filter(x=>x.slot===r.slot).sort((a,b)=>a.order-b.order);
  list.forEach((x,i)=>x.order=i);
  const i=list.findIndex(x=>x.id===id),j=i+dir;if(j<0||j>=list.length)return;
  list[i].order=j;list[j].order=i;save();render();}
function saveRoutine(id){
  const title=$('#rmTitle').value.trim();if(!title){uiAlert('名前を入力してください');return;}
  const freq=$('#rmFreq').value;
  if(freq==='weekly'&&!window._rdays.length){uiAlert('実行する曜日を選んでください');return;}
  if(freq==='monthly'&&!window._rnths.length){uiAlert('毎月の実行日（第◯曜）を1つ以上追加してください');return;}
  const data={title,slot:$('#rmSlot').value,estMin:+$('#rmEst').value||0,freq,
    days:[...window._rdays].sort(),nths:JSON.parse(JSON.stringify(window._rnths)),
    active:$('#rmActive').checked,links:collectLinks()};
  if(id)Object.assign(S.routines.find(r=>r.id===id),data);
  else S.routines.push({id:uid(),...data,order:Date.now(),stats:{n:0,total:0}});
  save();closeModal();render();}
async function delRoutine(id){if(!await uiConfirm('このルーティンを削除しますか？','削除'))return;
  S.routines=S.routines.filter(r=>r.id!==id);save();closeModal();render();}
function dupRoutine(id){const r=S.routines.find(x=>x.id===id);if(!r)return;
  S.routines.push({...JSON.parse(JSON.stringify(r)),id:uid(),title:r.title+'（コピー）',order:Date.now(),stats:{n:0,total:0}});
  save();closeModal();render();}

/* ========================= おはようフロー ========================= */
let flowList=[],flowIdx=0,flowStart=0,flowTimer=null;
function startFlow(){
  const t=todayStr();const log=dayLog(t);
  flowList=doItems(t).filter(it=>it.type==='r'&&!log.routines[it.obj.id]?.done).map(it=>it.obj);
  if(!flowList.length){uiAlert('今日のルーティンはすべて完了しています🎉');return;}
  flowIdx=0;$('#flow').classList.add('show');flowShow();}
function flowShow(){
  const r=flowList[flowIdx];flowStart=Date.now();
  const st=r.stats||{n:0,total:0};
  const t=todayStr();
  const remCount=flowList.length-flowIdx;
  const remEst=flowList.slice(flowIdx).reduce((s,x)=>s+(+x.estMin||0),0);
  const tks=todayTasks(t).filter(x=>x.status!=='done');
  const taskEst=tks.reduce((s,x)=>s+(+x.estMin||0),0);
  const now=new Date();const bed=Math.max(0,hm2min(daySleep(t))-(now.getHours()*60+now.getMinutes()));
  $('#flow').innerHTML=`
    <div class="fh"><span>ルーティン ${flowIdx+1} / ${flowList.length}</span><button onclick="flowClose()">終了 ✕</button></div>
    <div class="fstats"><span>残りルーティン <b>${remCount}</b>件・目安 <b>${fmtMin(remEst)}</b></span><span>タスク <b>${tks.length}</b>件・<b>${fmtMin(taskEst)}</b></span><span>就寝まで <b>${fmtMin(bed)}</b></span></div>
    <div class="fmain">
      <div class="slot">${SLOTS[r.slot]}のルーティン</div>
      <div class="rname">${esc(r.title)}</div>
      <div class="rmeta">目安 ${fmtMin(r.estMin)}${st.n?`　／　これまでの平均 ${fmtMin(st.total/st.n/60)}`:''}</div>
      <div class="watch" id="fwatch">00:00</div>
      ${r.links?.length?`<div class="flinks">${r.links.map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener">↗ ${esc(l.label)}</a>`).join('')}</div>`:''}
    </div>
    <div class="fbtns"><button onclick="flowSkip()">スキップ</button><button class="ok" onclick="flowDone()">完了 → 次へ</button></div>`;
  clearInterval(flowTimer);
  flowTimer=setInterval(()=>{const s=Math.floor((Date.now()-flowStart)/1000);
    const el=$('#fwatch');if(el)el.textContent=pad(Math.floor(s/60))+':'+pad(s%60);},250);}
function flowDone(){
  const r=flowList[flowIdx];const sec=Math.round((Date.now()-flowStart)/1000);
  const log=dayLog(todayStr());log.routines[r.id]={done:true,sec};
  r.stats=r.stats||{n:0,total:0};r.stats.n++;r.stats.total+=sec;
  save();flowNext();}
function flowSkip(){flowNext();}
function flowNext(){flowIdx++;
  if(flowIdx>=flowList.length){flowClose();celebrateIfAll();}
  else flowShow();}
function celebrateIfAll(){render();checkCelebrate();}
function flowClose(){clearInterval(flowTimer);$('#flow').classList.remove('show');render();}

function toggleNotify(el){
  if(!S.settings.notifyOn){
    if(!('Notification'in window)){uiAlert('この環境は通知に対応していません');return;}
    Notification.requestPermission().then(p=>{
      if(p==='granted'){S.settings.notifyOn=true;save();render();new Notification('くらしタスク',{body:'通知をオンにしました'});}
      else uiAlert('ブラウザの通知が許可されませんでした');});
  }else{S.settings.notifyOn=false;save();render();}}
async function sendNotes(){const memo=(S.notes||'').trim();
  if(!memo){uiAlert('メモが空です。先に改善メモを書いてください。');return;}
  const d=new Date();
  if(S.settings.feedbackUrl){
    try{
      await fetch(S.settings.feedbackUrl,{method:'POST',mode:'no-cors',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'feedback',type:'改善要望',content:memo,
          contact:S.settings.notifyEmail,sentAt:d.toISOString()})});
      S.notes='';save();render();
      uiAlert('送信しました📮 Notionの改善DBに記録され、Gmailにも通知が届きます。');
    }catch(e){uiAlert('送信に失敗しました。ネット接続を確認するか、後でもう一度お試しください。');}
  }else{
    location.href='mailto:'+encodeURIComponent(S.settings.notifyEmail)
      +'?subject='+encodeURIComponent(`【くらしタスク】改善メモ ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`)
      +'&body='+encodeURIComponent(memo);}}

  const name=$('#kmName').value.trim(),m=+$('#kmM').value,d=+$('#kmD').value;
  if(!name||!m||!d){uiAlert('名前と月日を入力してください');return;}
  const data={name,month:m,day:d,icon:window._mIcon||'gift',color:$('#kmColor button.on')?.dataset.c||'#D88A3D'};
  if(id)Object.assign(S.marks.find(x=>x.id===id),data);
  else S.marks.push({id:uid(),...data});
  save();markList();render();}
function groupModal(id){
  const g=id?S.groups.find(x=>x.id===id):null;
  openModal(`<div class="mh"><b>グループ</b><button onclick="closeModal()">✕</button></div>
  <div class="mbody">
    <div class="frow"><label>名前</label><input id="gmName" value="${esc(g?.name||'')}" placeholder="例）クライアントB"></div>
    <div class="frow"><label>親グループ（階層）</label><select id="gmParent">
      <option value="">なし（最上位）</option>
      ${S.groups.filter(x=>x.id!==id).map(x=>`<option value="${x.id}" ${g?.parentId===x.id?'selected':''}>${esc(groupPath(x.id))}</option>`).join('')}</select></div>
    <div class="frow"><label>色（列＝色系統、上から濃→淡。親と系統を揃えると階層がわかりやすい）</label><div class="colorsel" id="gmColor">
      ${PALETTE.map(c=>`<button data-c="${c}" class="${(g?.color||PALETTE[0])===c?'on':''}" style="background:${c}" onclick="$$('#gmColor button').forEach(x=>x.classList.remove('on'));this.classList.add('on')"></button>`).join('')}</div></div>
    ${g&&g.parentId?`<div class="mini" style="padding:0 0 8px;">マークの見え方：<span class="gmark" style="width:14px;height:14px;${markCss(g.id)}"></span>（親の色＋自分の色）</div>`:''}
  </div>
  <div class="mbtns">${g?`<button class="del" onclick="delGroup('${g.id}')">削除</button>`:''}
    <button class="save" onclick="saveGroup('${g?.id||''}')">保存</button></div>`);}
function saveGroup(id){
  const name=$('#gmName').value.trim();if(!name){uiAlert('名前を入力してください');return;}
  const parentId=$('#gmParent').value||null;
  if(id&&parentId){let p=parentId;while(p){if(p===id){uiAlert('自分自身の下には移動できません');return;}p=S.groups.find(x=>x.id===p)?.parentId;}}
  const color=$('#gmColor button.on')?.dataset.c||PALETTE[0];
  if(id)Object.assign(S.groups.find(x=>x.id===id),{name,parentId,color});
  else S.groups.push({id:uid(),name,parentId,color});
  save();groupList();render();}
async function delGroup(id){
  const kids=S.groups.some(g=>g.parentId===id);
  const used=S.tasks.some(t=>t.groupId===id)||S.events.some(e=>e.groupId===id);
  if(kids){uiAlert('先に下の階層のグループを削除してください');return;}
  if(!await uiConfirm(used?'このグループのタスク・予定は最初のグループに移動します。削除しますか？':'このグループを削除しますか？','削除'))return;
  const fb=S.groups.find(g=>g.id!==id)?.id;
  S.tasks.forEach(t=>{if(t.groupId===id)t.groupId=fb;});
  S.events.forEach(e=>{if(e.groupId===id)e.groupId=fb;});
  S.groups=S.groups.filter(g=>g.id!==id);save();groupList();render();}
function exportData(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,1)],{type:'application/json'}));
  a.download=`くらしタスク_バックアップ_${todayStr()}.json`;a.click();}
function importData(inp){const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async()=>{try{const d=JSON.parse(r.result);
    if(!d.tasks||!d.settings)throw 0;
    if(!await uiConfirm('現在のデータを読み込んだ内容で置き換えます。よろしいですか？'))return;
    S=d;save();render();uiAlert('読み込みました');}catch(e){uiAlert('ファイルを読み込めませんでした');}};
  r.readAsText(f);}

/* ========================= modal共通・ダイアログ・通知 ========================= */
function openModal(html){$('#modal').innerHTML=html;$('#modalWrap').classList.add('show');}
function closeModal(){$('#modalWrap').classList.remove('show');}
/* confirm()/prompt()は埋め込み環境で動かないためアプリ内ダイアログを使う */
let dlgResolve=null;
function dlgEnd(v){$('#dlgWrap').classList.remove('show');const r=dlgResolve;dlgResolve=null;if(r)r(v);}
function uiAlert(msg){return new Promise(res=>{dlgResolve=res;
  $('#dlg').innerHTML=`<div class="dm">${esc(msg)}</div><div class="db"><button class="ok" onclick="dlgEnd()">OK</button></div>`;
  $('#dlgWrap').classList.add('show');});}
function uiConfirm(msg,okLabel){return new Promise(res=>{dlgResolve=res;
  $('#dlg').innerHTML=`<div class="dm">${esc(msg)}</div><div class="db">
    <button onclick="dlgEnd(false)">やめる</button>
    <button class="${okLabel==='削除'?'dngr':'ok'}" onclick="dlgEnd(true)">${esc(okLabel||'OK')}</button></div>`;
  $('#dlgWrap').classList.add('show');});}
function uiPrompt(msg,def,type){return new Promise(res=>{dlgResolve=res;
  $('#dlg').innerHTML=`<div class="dm">${esc(msg)}<input id="dlgInput" type="${type||'text'}" value="${esc(def??'')}"></div>
    <div class="db"><button onclick="dlgEnd(null)">やめる</button>
    <button class="ok" onclick="dlgEnd($('#dlgInput').value)">OK</button></div>`;
  $('#dlgWrap').classList.add('show');
  setTimeout(()=>$('#dlgInput')?.focus(),80);});}
setInterval(()=>{
  if(!S?.settings.notifyOn||Notification.permission!=='granted')return;
  const now=new Date();const hm=pad(now.getHours())+':'+pad(now.getMinutes());const t=todayStr();
  [['notifyMorning','おはようございます☀ 今日の計画を立てましょう','m'],['notifyNight','おつかれさまでした🌙 明日の準備とふりかえりを','n']]
  .forEach(([key,msg,tag])=>{
    if(S.settings[key]===hm&&S.lastNotify[t+tag]!==1){
      S.lastNotify={[t+'m']:S.lastNotify[t+'m'],[t+'n']:S.lastNotify[t+'n'],[t+tag]:1};
      save();new Notification('くらしタスク',{body:msg});}});
},20000);

/* ========================= 起動 ========================= */
load();save();
switchView('today');
if(syncReady())pullState();
</script>
