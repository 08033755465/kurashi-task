<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#15171A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="くらしタスク">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>くらしタスク｜タスク&カレンダー</title>
<style>
:root{
  --ink:#15171A; --sub:#788091; --line:#E4E6EA; --line2:#F0F1F4;
  --bg:#FFFFFF; --bg2:#F7F8FA; --accent:#2456E6; --danger:#C9403C;
  --wait:#D98324; --done:#9AA1AD; --sat:#3D6FD8; --sun:#C9403C;
}
*{margin:0;padding:0;box-sizing:border-box;border-radius:0 !important;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:var(--ink);background:var(--bg);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;
  touch-action:manipulation; /* ダブルタップ拡大を無効化（ピンチ・スクロールは可） */
}
#app{max-width:960px;margin:0 auto;min-height:100%;padding-bottom:76px;padding-top:max(env(safe-area-inset-top),6px);}
/* 上部（時計・ダイナミックアイランド）にコンテンツが潜り込まないよう不透明マスク */
#safetop{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top);background:var(--bg);z-index:70;pointer-events:none;}
button{font-family:inherit;font-size:inherit;background:none;border:none;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg);border:1px solid var(--line);padding:9px 10px;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink);}
label{font-size:12px;color:var(--sub);letter-spacing:.06em;display:block;margin-bottom:4px;}

/* ===== view header ===== */
.vhead{display:flex;align-items:baseline;justify-content:space-between;padding:18px 16px 10px;border-bottom:1px solid var(--ink);position:sticky;top:env(safe-area-inset-top);z-index:40;background:var(--bg);}
.vhead h1{font-size:18px;font-weight:700;letter-spacing:.12em;}
.vhead .sub{font-size:12px;color:var(--sub);letter-spacing:.05em;}

/* ===== bottom nav ===== */
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--ink);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
#nav button{flex:1;padding:10px 0 8px;font-size:10px;letter-spacing:.02em;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap;height:56px;justify-content:center;}
#nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.6;}
#nav button.on{color:var(--ink);font-weight:700;}
#nav{max-width:960px;margin:0 auto;}

/* ===== chips ===== */
.chips{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;border-bottom:1px solid var(--line);scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;padding:5px 12px;border:1px solid var(--line);font-size:12.5px;letter-spacing:.04em;white-space:nowrap;color:var(--sub);display:flex;align-items:center;gap:6px;}
.chip .dot{width:8px;height:8px;display:inline-block;}
.chip.on{border-color:var(--ink);color:var(--ink);font-weight:600;}
.seg{display:flex;border:1px solid var(--line);margin:12px 16px 0;width:fit-content;overflow-x:auto;}
.seg button{padding:6px 13px;font-size:12.5px;color:var(--sub);letter-spacing:.03em;white-space:nowrap;}
.seg button.on{background:var(--ink);color:#fff;}

/* ===== sections ===== */
.sec{padding:0 0 4px;}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 6px;font-size:12px;letter-spacing:.14em;color:var(--sub);font-weight:600;}
.sec-h .act{color:var(--accent);font-size:12.5px;letter-spacing:.04em;}

/* ===== task items ===== */
.titem{display:flex;align-items:stretch;border-bottom:1px solid var(--line2);cursor:pointer;}
.titem .bar{width:4px;flex:0 0 4px;}
.titem .body{flex:1;padding:10px 10px 10px 12px;min-width:0;}
.titem .tt{font-size:15px;font-weight:500;display:flex;align-items:center;gap:6px;}
.titem .tt.done{color:var(--done);text-decoration:line-through;font-weight:400;}
.titem .meta{font-size:11.5px;color:var(--sub);display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;}
.titem .right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:5px;padding:8px 12px 8px 0;}
.badge{font-size:10.5px;letter-spacing:.06em;padding:2px 8px;border:1px solid var(--line);color:var(--sub);white-space:nowrap;}
.badge.todo{border-color:var(--line);}
.badge.doing{border-color:var(--accent);color:var(--accent);}
.badge.wait{border-color:var(--wait);color:var(--wait);background:#FBF3E6;font-weight:700;}
.badge.done{border-color:var(--line);color:var(--done);}
.pr1{color:var(--danger);font-weight:700;}
.pr3{color:var(--sub);}
.todayBtn{font-size:11px;padding:2px 8px;border:1px solid var(--line);color:var(--sub);white-space:nowrap;}
.todayBtn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.linkchips{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.linkchip{font-size:11px;padding:2px 9px;border:1px solid var(--line);color:var(--accent);display:flex;align-items:center;gap:4px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* quick add */
.qadd{display:flex;gap:0;padding:12px 16px;border-bottom:1px solid var(--line);}
.qadd input{border-right:none;flex:1;}
.qadd select{width:110px;border-right:none;font-size:13px;}
.qadd button{background:var(--ink);color:#fff;padding:0 18px;font-size:13px;letter-spacing:.1em;flex:0 0 auto;}

/* ===== today ===== */
.tdhead{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--line);gap:10px;}
.tdhead .date .d1{font-size:26px;font-weight:700;letter-spacing:.02em;}
.tdhead .date .d2{font-size:12px;color:var(--sub);letter-spacing:.08em;margin-top:2px;}
.tdhead .date .hol{color:var(--danger);}
.ring{position:relative;width:78px;height:78px;flex:0 0 78px;}
.ring svg{transform:rotate(-90deg);}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:17px;font-weight:700;}
.ring .pct span{font-size:9px;color:var(--sub);font-weight:400;letter-spacing:.1em;}
.timebar{padding:12px 16px;border-bottom:1px solid var(--line);}
.timebar .row{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px;align-items:center;flex-wrap:wrap;gap:2px 8px;}
.timebar .row b{color:var(--ink);font-size:13.5px;}
.timebar .nums{white-space:nowrap;}
.availEdit{margin-left:6px;}
.timebar .gauge{height:6px;background:var(--bg2);position:relative;}
.timebar .gauge i{position:absolute;top:0;bottom:0;left:0;background:var(--ink);}
.timebar .gauge i.over{background:var(--danger);}
.timebar .neg{color:var(--danger);font-weight:700;}
.availEdit{font-size:12.5px;color:var(--accent);}
/* 朝昼夜の配分パネル（#5） */
.huechips{display:flex;flex-wrap:wrap;gap:5px 10px;margin-top:9px;padding-top:8px;border-top:1px dashed var(--line);}
.huechip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);}
.huechip .d{width:11px;height:11px;border-radius:50% !important;}
.tasksearch{display:flex;align-items:center;gap:6px;padding:8px 16px 4px;}
.tasksearch input{flex:1;font-size:14px;padding:9px 12px;}
.tasksearch button{flex:0 0 auto;font-size:16px;color:var(--sub);padding:4px 8px;}
.bandpanel{margin-top:10px;padding-top:9px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:6px;}
.bprow{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--sub);}
.bprow .bplab{width:16px;font-weight:700;text-align:center;flex:0 0 16px;}
.bprow .bptime{width:96px;flex:0 0 96px;font-variant-numeric:tabular-nums;}
.bprow .bpgauge{flex:1;height:7px;background:var(--bg2);position:relative;}
.bprow .bpgauge i{position:absolute;top:0;bottom:0;left:0;}
.bprow .bpnum{width:70px;flex:0 0 70px;text-align:right;color:var(--ink);font-variant-numeric:tabular-nums;}
.bprow .bpnum.neg{color:var(--danger);font-weight:700;}
/* 縦タイムライン（#6・B案：左＝配置済み／右＝未配置プール） */
.tlwrap{display:flex;gap:8px;margin:8px 12px 4px;align-items:flex-start;position:relative;}
/* 予定タップ→右側にピヨっと出る詳細ポップ */
.evpop{position:absolute;right:0;width:60%;max-width:230px;background:var(--card,#fff);border:1px solid var(--line);border-radius:12px !important;box-shadow:0 8px 26px rgba(0,0,0,.22);z-index:45;overflow:hidden;transform-origin:right top;animation:evpopin .18s cubic-bezier(.34,1.56,.64,1);}
@keyframes evpopin{from{opacity:0;transform:scale(.8) translateX(8px);}to{opacity:1;transform:scale(1) translateX(0);}}
/* 月タップ→その日の予定ポップ */
#daypop{position:fixed;inset:0;background:rgba(21,23,26,.35);z-index:120;display:none;align-items:center;justify-content:center;padding:24px;}
#daypop.show{display:flex;}
#daypop .dpbox{background:var(--card,#fff);width:100%;max-width:340px;max-height:76vh;overflow-y:auto;border-radius:16px !important;box-shadow:0 12px 40px rgba(0,0,0,.3);transform-origin:center;animation:evpopin .16s cubic-bezier(.34,1.4,.64,1);}
#daypop .dph{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card,#fff);}
#daypop .dph b{font-size:15px;}
#daypop .dph button{font-size:18px;color:var(--sub);}
#daypop .dpbody{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
#daypop .dpev{padding:7px 10px;border-radius:8px !important;display:flex;flex-direction:column;gap:4px;}
#daypop .dpevrow{display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;}
#daypop .dpevmemo{font-size:11px;line-height:1.45;opacity:.92;word-break:break-word;}
#daypop .dpevt{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#daypop .dpevm{font-size:11px;opacity:.85;white-space:nowrap;font-variant-numeric:tabular-nums;}
#daypop .dpmk{font-size:12.5px;display:flex;align-items:center;gap:6px;}
#daypop .dpdue{font-size:12px;color:var(--sub);}
#daypop .dpempty{font-size:12.5px;color:var(--sub);padding:6px 2px;}
#daypop .dpacts{display:flex;gap:6px;padding:4px 12px 10px;}
#daypop .dpacts button{flex:1;border:1px solid var(--line);border-radius:8px !important;padding:9px 4px;font-size:12.5px;}
#daypop .dphint{text-align:center;font-size:10.5px;color:var(--sub);padding:0 0 10px;}
.evpoph{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:7px 10px;font-size:12.5px;line-height:1.3;}
.evpoph b{font-weight:700;}
.evpoph button{font-size:15px;flex:0 0 auto;}
.evpopb{padding:8px 10px 10px;display:flex;flex-direction:column;gap:6px;}
.evpopt{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums;}
.evpopcat{font-size:11.5px;display:flex;align-items:center;gap:6px;}
.evpopcat .dot{width:11px;height:11px;flex:0 0 11px;border-radius:50% !important;}
.evpopmemo{font-size:12px;line-height:1.5;color:var(--ink);word-break:break-word;}
.evpopacts{display:flex;gap:6px;margin-top:2px;}
.evpopacts button{flex:1;border:1px solid var(--line);border-radius:8px !important;padding:7px 4px;font-size:11.5px;}
.tlnowbtns{position:sticky;bottom:calc(70px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:flex-end;margin:0 14px;z-index:58;pointer-events:none;}
.tlnowbtn{pointer-events:auto;background:var(--ink);color:#fff;padding:8px 14px;border-radius:20px !important;font-size:12.5px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.28);}
.tl{position:relative;flex:1;min-width:0;}
.tl .tlhr{position:absolute;left:44px;right:0;border-top:1px solid #C7CCD3;}
.tl .tlhr.m{border-top:1px dashed #D8DCE2;}
.tl .tlhr.m5{border-top:1px dotted #EDEFF2;}
.tl .tltask.shifted{border-left-style:dashed;}
.tl .tlhrlab{position:absolute;left:0;width:40px;font-size:10px;color:var(--sub);text-align:right;font-variant-numeric:tabular-nums;}
.tl .tlzone{position:absolute;left:44px;right:0;opacity:.55;}
.tl .tlzlab{position:absolute;left:48px;font-size:10px;font-weight:800;letter-spacing:.14em;opacity:.85;}
.tl .tlev{position:absolute;left:46px;right:4px;background:#EEF1F6;font-size:10.5px;line-height:1.25;padding:2px 7px;overflow:hidden;color:var(--ink);z-index:1;border-radius:6px !important;}
.tl .tlev b{font-variant-numeric:tabular-nums;}
.tl .tltask{position:absolute;left:46px;right:4px;background:#fff;border-left:3px solid var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.10);font-size:11.5px;line-height:1.2;padding:0 8px;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:6px;z-index:2;border-radius:6px !important;}
.tl .tltask .tltt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.tl .tltask .tltm{font-size:10px;color:var(--sub);white-space:nowrap;flex:0 0 auto;font-variant-numeric:tabular-nums;}
.tl .tltask.over{background:#FCECEA;border-left-color:var(--danger)!important;}
.tl .tltask.over .tltm{color:var(--danger);}
.tl .tltask.tlsel{outline:2.5px solid var(--accent);outline-offset:-1px;z-index:3;font-weight:700;}
.tl .tlev.tlsel{outline:2.5px solid var(--ink);outline-offset:-1px;z-index:3;}
.poolitem.sel{outline:2.5px solid var(--accent);}
/* タイムライン下部の一括操作バー */
.tlbar{position:sticky;bottom:calc(env(safe-area-inset-bottom) + 4px);z-index:60;margin:8px 12px;background:var(--ink);color:#fff;padding:9px 12px;border-radius:12px !important;box-shadow:0 6px 20px rgba(0,0,0,.28);}
.tlbar.ev{background:#3A3D42;}
.tlbar .tlbn{font-size:12px;font-weight:700;display:block;margin-bottom:7px;opacity:.9;}
.tlbar .tlbtns{display:flex;gap:6px;flex-wrap:wrap;}
.tlbar .tlbtns button{flex:1 1 auto;min-width:62px;color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px !important;padding:9px 6px;font-size:12.5px;font-weight:600;background:rgba(255,255,255,.06);}
.tlbar .tlbtns button.cl{flex:0 0 auto;min-width:40px;}
.tl .tltask.done{opacity:.42;background:#F4F5F7;box-shadow:none;z-index:1;}
.tl .tltask.done .tltt{text-decoration:line-through;}
.tl.placing{cursor:pointer;outline:2px dashed var(--accent);outline-offset:-2px;}
.tl.placing .tltask,.tl.placing .tlev{pointer-events:none;opacity:.5;}
/* 右：未配置プール */
.tlpool{flex:0 0 118px;width:118px;position:sticky;top:calc(env(safe-area-inset-top) + 6px);align-self:flex-start;display:flex;flex-direction:column;gap:5px;}
.tlpoolh{font-size:10.5px;font-weight:700;color:var(--sub);padding:0 2px;}
.poolitem{display:flex;flex-direction:column;gap:1px;padding:6px 7px;background:var(--card,#fff);border:1px solid var(--line);box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer;}
.poolitem.sel{outline:2px solid var(--accent);background:#EEF3FF;}
.poolitem .pt{font-size:11px;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.poolitem .pm{font-size:9.5px;color:var(--sub);}
.poolempty{font-size:11px;color:var(--sub);padding:8px 2px;}
.poolall{font-size:11px;color:var(--accent);border:1px solid var(--line);padding:6px 0;margin-top:2px;}
.tlplacehint{position:sticky;top:calc(env(safe-area-inset-top) + 2px);z-index:20;margin:0 12px 6px;padding:8px 12px;background:var(--accent);color:#fff;font-size:12.5px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.tlplacehint button{color:#fff;border:1px solid rgba(255,255,255,.6);font-size:12px;padding:3px 10px;}
.tl .tlnow{position:absolute;left:44px;right:0;border-top:2px solid #E5484D;z-index:4;}
.tl .tlnow span{position:absolute;left:-44px;top:-8px;font-size:9.5px;color:#E5484D;font-weight:700;background:#fff;padding:0 2px;}
.tl .tlsleep{position:absolute;left:44px;right:0;border-top:2px dashed #7B5EC7;z-index:3;}
.tl .tlsleep span{position:absolute;left:-44px;top:-8px;font-size:9.5px;color:#7B5EC7;font-weight:700;background:#fff;padding:0 2px;}
.tl .tllog{position:absolute;left:46px;right:4px;background:#FFFCF3;border:1px dashed #DCD4C0;border-left:3px solid;font-size:10.5px;padding:3px 7px;display:flex;align-items:center;gap:5px;z-index:2;border-radius:6px !important;overflow:hidden;color:#5B5647;}
.tl .tllog .lgi{flex:0 0 auto;}
.tl .tllog .lgx{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl .tllog .lgd{flex:0 0 auto;font-size:9.5px;color:var(--sub);}
.tlwarn{margin:2px 16px 10px;padding:8px 11px;background:#FCECEA;border-left:3px solid var(--danger);font-size:12px;color:#8A2A24;line-height:1.5;}
.bigmin{font-size:26px !important;font-weight:700;text-align:center;letter-spacing:.05em;padding:12px !important;}
.minchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.minchips button{flex:1 1 auto;min-width:52px;border:1px solid var(--line);padding:9px 0;font-size:13px;}
.minchips button:active{background:var(--ink);color:#fff;}
#undobar{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(64px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;padding:9px 10px 9px 16px;border-radius:24px !important;display:none;align-items:center;gap:12px;z-index:70;box-shadow:0 6px 24px rgba(0,0,0,.3);font-size:13px;max-width:92vw;opacity:0;transition:opacity .25s,transform .25s;}
#undobar.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0);}
#undobar button{color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:16px !important;padding:6px 14px;font-size:13px;font-weight:700;white-space:nowrap;}
/* 配色パレット選択 */
.huelegend{display:flex;flex-direction:column;gap:6px;padding:2px 16px 6px;}
.huerow{display:flex;align-items:center;gap:8px;}
.huerow .hcp{width:34px;height:30px;flex:0 0 34px;padding:2px;border:1px solid var(--line);border-radius:6px !important;background:none;cursor:pointer;}
.huerow .hlab{flex:1;min-width:0;font-size:12.5px;padding:6px 8px;}
.huerow .huse{flex:1;min-width:0;font-size:11.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.huerow .huse .unused{color:var(--line);}
.huerow .huereset{flex:0 0 30px;width:30px;height:30px;font-size:16px;color:var(--accent);border:1px solid var(--line);border-radius:6px !important;}
.huerow .huereset.off{visibility:hidden;}
/* 予定編集の色ピッカー */
.huepick{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.huepick button{height:30px;border-radius:6px !important;border:2px solid transparent;position:relative;overflow:hidden;}
.huepick button.on{border-color:var(--ink);}
.huepick button .pop{position:absolute;right:0;top:0;bottom:0;width:42%;}
.huepick button .uz{position:absolute;left:3px;bottom:3px;width:5px;height:5px;border-radius:50% !important;background:rgba(0,0,0,.55);}
/* グループ階層ツリー */
.grouptree{display:flex;flex-direction:column;}
.grow{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line2);position:relative;}
.grow .gline{width:4px;align-self:stretch;flex:0 0 4px;border-radius:2px !important;margin-right:-2px;}
.grow .gchip{width:20px;height:20px;flex:0 0 20px;border-radius:6px !important;cursor:pointer;}
.grow .gname{flex:1;min-width:0;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.grow .gacts{display:flex;gap:3px;flex:0 0 auto;}
.grow .gacts button{width:30px;height:30px;border:1px solid var(--line);font-size:13px;color:var(--sub);border-radius:6px !important;}
.grow .gacts button.addc{width:auto;padding:0 8px;font-size:11.5px;color:var(--accent);}
.huepick.labeled{grid-template-columns:repeat(2,1fr);}
.huepick.labeled button{height:32px;display:flex;align-items:center;gap:6px;padding:0 8px;justify-content:flex-start;overflow:hidden;}
.huepick.labeled button .pop{position:static;width:12px;height:12px;flex:0 0 12px;border-radius:3px !important;}
.huepick.labeled button .hpl{font-size:11px;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.huepick.labeled button .hpl.used{font-weight:700;}
.huepick.labeled button .hpl.unused{color:rgba(0,0,0,.4);}
.helpwrap{padding:6px 16px 20px;}
.helpwrap h3{font-size:14px;margin:16px 0 6px;display:flex;align-items:center;gap:7px;}
.helpwrap p{font-size:13px;line-height:1.7;color:var(--ink);margin:0 0 6px;}
.helpwrap .step{display:flex;gap:9px;margin:0 0 8px;font-size:13px;line-height:1.6;}
.helpwrap .step b{flex:0 0 22px;height:22px;background:var(--ink);color:#fff;border-radius:50% !important;display:flex;align-items:center;justify-content:center;font-size:12px;}
/* カレンダーの色付き予定ブロック（週ビュー等） */
.cev{position:relative;padding:5px 8px 6px;margin-bottom:4px;display:flex;flex-direction:column;gap:2px;border-radius:7px !important;}
.cev.imp{font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.16);}
.cev .cevt{font-size:11.5px;line-height:1.25;word-break:break-word;font-weight:600;padding-right:12px;}
.cev .cevm{font-size:9.5px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:3px;opacity:.9;}
.cevrep{position:absolute;top:4px;right:5px;opacity:.65;}
.dcev{padding:8px 11px 9px;margin:0 16px 7px;}
.dcev .cevt{font-size:13.5px;}
.dcev .cevm{font-size:10.5px;margin-top:1px;}
.cevmemo{font-size:11px;margin-top:3px;opacity:.9;line-height:1.4;}
/* 1日の記録・流れ */
.drec{display:flex;align-items:flex-start;gap:8px;padding:7px 16px;border-bottom:1px solid var(--line2);}
.drec .drt{flex:0 0 42px;font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums;padding-top:2px;}
.drec .drdot{flex:0 0 8px;width:8px;height:8px;margin-top:5px;border-radius:50% !important;}
.drec .drb{flex:1;min-width:0;}
.drec .drx{font-size:13px;line-height:1.35;word-break:break-word;}
.drec .drs{font-size:10.5px;color:var(--sub);}
.drec.undoable{cursor:pointer;}
.drec.undoable:active{background:var(--bg2);}
.drecadd{width:calc(100% - 32px);margin:8px 16px 2px;padding:8px 0;border:1px dashed var(--line);color:var(--accent);font-size:12px;}
.cki{width:11px;height:11px;flex:0 0 11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-1px;}
.cevrep .cki{width:12px;height:12px;}
.evmk{display:inline-flex;width:13px;height:13px;vertical-align:-2px;margin-right:3px;}
.evmk svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.rfilter{display:flex;gap:5px;padding:2px 16px 8px;overflow-x:auto;}
.cfold{margin:6px 0 10px;}
.cfoldh{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--ink);font-size:13.5px;}
.cfoldh .chip{flex:0 0 auto;}
.rfilter button{flex:0 0 auto;min-width:30px;padding:5px 9px;font-size:12px;border:1px solid var(--line);color:var(--sub);background:var(--card,#fff);}
.rfilter button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
/* 日付ピッカー（予定の複製先） */
.dpnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:700;}
.dpnav button{font-size:20px;padding:2px 14px;color:var(--accent);}
.dpgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dpgrid .dpw{text-align:center;font-size:10px;color:var(--sub);padding:2px 0;}
.dpgrid button{aspect-ratio:1;font-size:13px;border:1px solid var(--line);}
.dpgrid button:active{background:var(--accent);color:#fff;}
.startBtn{display:block;width:calc(100% - 32px);margin:14px 16px 4px;background:var(--ink);color:#fff;padding:13px 0;font-size:15px;font-weight:700;letter-spacing:.2em;}
.startBtn:active{opacity:.8;}
.startrow{display:flex;gap:8px;padding:12px 16px 0;}
.startBtn2{flex:1;background:var(--ink);color:#fff;padding:12px 0;font-size:15px;font-weight:700;letter-spacing:.15em;}
.startBtn2:active{opacity:.85;}
.composeBtn{flex:0 0 auto;border:1px solid var(--line);color:var(--ink);padding:12px 14px;font-size:13px;white-space:nowrap;}
.composeBtn.on{border-color:var(--ink);font-weight:700;}
/* 省スペース（コンパクト）行 */
.ditem{display:flex;align-items:center;gap:9px;padding:7px 16px;border-bottom:1px solid var(--line2);}
.ditem .chk{width:20px;height:20px;flex:0 0 20px;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ditem.done .chk{background:var(--ink);}
.ditem .chk svg{width:13px;height:13px;stroke:#fff;stroke-width:2.5;fill:none;}
.ditem .dt{flex:1;min-width:0;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.ditem.done .dt{text-decoration:line-through;color:var(--done);}
.ditem .dtime{font-size:11px;color:var(--sub);flex:0 0 auto;white-space:nowrap;}
.wtag{font-size:9.5px;color:var(--wait);border:1px solid var(--wait);padding:0 4px;margin-left:5px;}
.carriedtag{font-size:9.5px;color:var(--wait);border:1px solid #E6C48A;background:#FBF3E4;padding:0 5px;margin-left:5px;flex:0 0 auto;white-space:nowrap;}
.typetag{font-size:9px;padding:1px 5px;border:1px solid var(--line2);color:var(--sub);flex:0 0 auto;white-space:nowrap;letter-spacing:.02em;}
.typetag.r{color:#3D6FD8;border-color:#C4D3F2;}
.typetag.t{color:#8A909A;}
.ditem{border-left:3px solid transparent;}
.gmsg{padding:10px 16px 2px;font-size:13px;color:var(--sub);}

/* routine check row */
.ritem{display:flex;align-items:center;border-bottom:1px solid var(--line2);padding:9px 16px;gap:11px;}
.chk{width:22px;height:22px;border:1.5px solid var(--ink);flex:0 0 22px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.titem>.chk{align-self:center;margin-left:8px;}
.ritem.done .chk,.titem.done .chk{background:var(--ink);}
.chk svg{width:14px;height:14px;stroke:#fff;stroke-width:2.5;fill:none;}
.ritem .rb{flex:1;min-width:0;}
.ritem .rt{font-size:14.5px;}
.ritem.done .rt{color:var(--done);text-decoration:line-through;}
.ritem .rm{font-size:11px;color:var(--sub);}
.slotTag{font-size:10px;letter-spacing:.1em;color:var(--sub);border:1px solid var(--line);padding:1px 6px;}

/* ===== calendar ===== */
.calbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);}
.calbar{gap:6px;}
.calbar .ym{font-size:16px;font-weight:700;letter-spacing:.03em;white-space:nowrap;flex:0 0 auto;}
.calmode button{padding:5px 10px;}
.calbar .mv{display:flex;gap:2px;}
.calbar .mv button{padding:5px 13px;border:1px solid var(--line);font-size:14px;}
.calmode{display:flex;border:1px solid var(--line);}
.calmode button{padding:5px 13px;font-size:12px;color:var(--sub);}
.calmode button.on{background:var(--ink);color:#fff;}
#calGrid{display:grid;grid-template-columns:repeat(7,1fr);}
.dow{font-size:10.5px;text-align:center;color:var(--sub);letter-spacing:.1em;padding:6px 0;border-bottom:1px solid var(--line);}
.cell{min-height:88px;border-bottom:1px solid var(--line2);border-right:1px solid var(--line2);padding:3px 3px 4px;position:relative;cursor:pointer;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;overflow:hidden;}
.cell:nth-child(7n){border-right:none;}
.cell.out{opacity:.35;}
.cell.today .dn{background:var(--ink);color:#fff;}
.cell .top{display:flex;align-items:center;gap:3px;}
.cell .dn{font-size:12.5px;font-weight:600;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.cell .dn.sat{color:var(--sat);} .cell .dn.sun{color:var(--sun);}
.cell .rk{font-size:8.5px;color:var(--sub);letter-spacing:0;}
.cell .rk.taian{color:var(--danger);}
.cell .ich{font-size:8.5px;color:#B8860B;}
.cell .holname{font-size:8.5px;color:var(--danger);line-height:1.2;padding-left:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cell .marks{display:flex;gap:2px;padding:1px 0 1px 2px;flex-wrap:wrap;}
.cell .marks svg{width:12px;height:12px;stroke-width:1.6;fill:none;}
.evbar{font-size:9.5px;line-height:1.5;padding:0 3px;margin-top:1px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.evbar.due{background:none !important;border:1px dashed var(--sub);color:var(--sub);}
.evmore{font-size:9px;color:var(--sub);padding-left:3px;}

/* week/day */
.wrow{display:flex;border-bottom:1px solid var(--line2);cursor:pointer;}
.wrow .wd{flex:0 0 74px;padding:10px 8px;border-right:1px solid var(--line2);text-align:center;}
.wrow .wd .n{font-size:17px;font-weight:700;}
.wrow .wd .r{font-size:9.5px;color:var(--sub);}
.wrow .wd .h{font-size:9.5px;color:var(--danger);}
.wrow .wbody{flex:1;padding:8px 12px;min-width:0;}
.wev{display:flex;gap:8px;font-size:13px;align-items:baseline;margin-bottom:3px;}
.wev .t{color:var(--sub);font-size:11.5px;flex:0 0 auto;}
.wev .c{width:8px;height:8px;flex:0 0 8px;align-self:center;}
.dayhead{padding:16px;border-bottom:1px solid var(--line);}
.dayhead .d1{font-size:22px;font-weight:700;}
.dayhead .d2{font-size:12px;color:var(--sub);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;}
.dayhead .hol{color:var(--danger);}
.addrow{display:flex;gap:8px;padding:12px 16px;}
.addrow button{flex:1;border:1px solid var(--ink);padding:9px 0;font-size:13px;letter-spacing:.1em;font-weight:600;}
.addrow button.fill{background:var(--ink);color:#fff;}

/* ===== modal ===== */
#modalWrap{position:fixed;inset:0;background:rgba(21,23,26,.45);z-index:100;display:none;align-items:flex-end;justify-content:center;}
#modalWrap.show{display:flex;}
#modal{background:var(--bg);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;padding:0 0 calc(16px + env(safe-area-inset-bottom));}
#modal .mh{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--ink);position:sticky;top:0;background:var(--bg);z-index:2;}
#modal .mh b{letter-spacing:.1em;font-size:15px;}
#modal .mh button{font-size:22px;line-height:1;color:var(--sub);padding:2px 6px;}
.mbody{padding:14px 16px;}
.frow{margin-bottom:12px;}
.f2{display:flex;gap:10px;}
.f2>div{flex:1;}
.mbtns{display:flex;gap:8px;padding:4px 16px 8px;}
.mbtns button{flex:1;padding:11px 0;font-size:13.5px;letter-spacing:.1em;border:1px solid var(--line);color:var(--sub);}
.mbtns .save{background:var(--ink);color:#fff;border-color:var(--ink);flex:2;font-weight:700;}
.mbtns .del{color:var(--danger);border-color:var(--danger);}
.daysel{display:flex;gap:4px;}
.daysel button{flex:1;padding:7px 0;border:1px solid var(--line);font-size:12.5px;color:var(--sub);}
.daysel button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.linkedit{border:1px solid var(--line2);padding:8px;margin-bottom:6px;display:flex;gap:6px;align-items:center;}
.linkedit input{padding:6px 8px;font-size:13px;}
.linkedit .lb{width:34%;}
.linkedit button{color:var(--danger);font-size:16px;padding:0 4px;}
.addlink{font-size:12.5px;color:var(--accent);padding:2px 0;}
.tmplchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tmplchips .chip{cursor:pointer;}
.quadsel{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.quadsel button{border:1px solid var(--line);padding:9px 8px;font-size:13px;text-align:left;line-height:1.35;font-weight:600;}
.quadsel button small{display:block;font-size:10px;font-weight:400;opacity:.8;}
.quadsel button.on{background:var(--bg2);border-width:2px;}
.quadsel .none{grid-column:1 / -1;text-align:center;color:var(--sub);border-color:var(--line);font-weight:400;}
.colorsel{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
.colorsel.c6{grid-template-columns:repeat(6,1fr);}
.colorsel button{height:30px;border:2px solid transparent;}
.colorsel button.on{border-color:var(--ink);}
.icontabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.icontabs button{border:1px solid var(--line);padding:4px 10px;font-size:12px;color:var(--sub);}
.icontabs button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.icongrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.icongrid button{border:1px solid var(--line2);height:44px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
.icongrid button.on{border-color:var(--ink);background:var(--bg2);}
.icongrid svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.6;}
.gmark{display:inline-block;width:9px;height:9px;flex:0 0 9px;}
/* テンキー対応タイムピッカー */
.tp{display:flex;align-items:center;gap:2px;}
.tp-col{display:flex;flex-direction:column;align-items:center;}
.tp-col button{font-size:9px;color:var(--sub);padding:3px 12px;border:1px solid var(--line2);line-height:1;}
.tp-num{width:46px;text-align:center;font-size:16px;font-weight:600;padding:4px 2px;border:1px solid var(--line);margin:2px 0;}
.tp-sep{font-weight:700;padding:0 2px;color:var(--sub);}
.tp-clear{color:var(--sub);font-size:13px;padding:0 7px;align-self:center;}
.pinbadge{font-size:9.5px;border:1px solid var(--line);color:var(--sub);padding:1px 5px;letter-spacing:.05em;margin-left:4px;white-space:nowrap;}
.arrows{display:flex;flex-direction:column;gap:3px;justify-content:center;padding:0 8px 0 0;}
.arrows button{border:1px solid var(--line2);font-size:9px;line-height:1;padding:5px 7px;color:var(--sub);}
/* 4つの箱 */
.quadwrap{padding:10px 12px;}
.qhint{font-size:11.5px;color:var(--sub);padding:2px 4px 8px;line-height:1.6;}
.qtray{display:flex;gap:6px;flex-wrap:wrap;padding:0 4px 4px;}
.qchip{border:1px solid var(--line);padding:5px 10px;font-size:12px;display:flex;gap:6px;align-items:center;max-width:100%;}
.qchip .qt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qchip.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.qbox{border:1px solid var(--line);min-height:120px;padding-bottom:4px;}
.qbox.target{border-style:dashed;border-color:var(--ink);cursor:pointer;background:var(--bg2);}
.qbox .qh{font-size:10px;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;align-items:baseline;gap:4px;color:var(--sub);}
.qbox .qh b{font-size:12px;}
.qtask{display:flex;align-items:center;gap:5px;padding:6px 6px;border-bottom:1px solid var(--line2);font-size:12px;}
.qtask.sel{background:var(--ink);color:#fff;}
.qtask .qt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qtask button{font-size:10px;color:var(--sub);padding:1px 3px;}
.qtask.sel button{color:#fff;}
/* 連続4桁タイム入力 */
.tfrow{display:flex;align-items:center;}
.tf{width:96px;text-align:center;font-size:18px;font-weight:600;letter-spacing:.1em;}
.tf-clear{font-size:11px;color:var(--sub);border:1px solid var(--line);padding:8px 9px;margin-left:6px;white-space:nowrap;}
.rep{font-size:10.5px;color:var(--accent);border:1px solid var(--line);padding:1px 6px;}
/* ルーティン頻度ビルダー */
.nthbuild{border:1px solid var(--line2);padding:8px;}
.nthlist{display:flex;flex-wrap:wrap;gap:5px;}
.nthlist:empty{display:none;}
.nthlist .nc{border:1px solid var(--ink);padding:3px 4px 3px 9px;font-size:12.5px;display:flex;gap:4px;align-items:center;}
.nthlist .nc button{color:var(--danger);font-size:14px;padding:0 3px;}
.nthadd{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;}
.nthadd select{width:auto;padding:7px 8px;}
.wdsel{display:flex;gap:3px;}
.wdsel button{width:30px;padding:7px 0;border:1px solid var(--line);font-size:12px;color:var(--sub);}
.wdsel button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.inlineadd{font-size:12px;color:var(--accent);border:1px solid var(--line);padding:9px 10px;white-space:nowrap;}
/* 月ALL全表示 */
.allbadge{font-size:8px;color:#fff;background:var(--sub);padding:0 3px;margin-left:3px;vertical-align:middle;letter-spacing:.05em;}
.calmode button.on .allbadge{background:#fff;color:var(--ink);}
.evtime{font-size:8px;opacity:.9;margin-right:2px;font-variant-numeric:tabular-nums;}
.evfrac{display:inline-flex;flex-direction:column;line-height:.82;font-size:6.5px;vertical-align:middle;margin-right:2px;text-align:center;font-variant-numeric:tabular-nums;opacity:.85;}
.nightglyph{margin-right:1px;}
.rtag{font-size:9.5px;border:1px solid var(--line);color:var(--sub);padding:1px 5px;margin-left:2px;vertical-align:middle;}
.ritem .rb{cursor:pointer;}
.nightsep.am{color:#B07D12;background:#FAF5E6;}
.nightsep.pm{color:#A96A1A;background:#FAF1E2;}
.wrow.wtoday{background:#EEF2FF;}
.wtodaytag{font-size:9px;color:#2456E6;font-weight:700;margin-top:2px;}
.cell.shade{background-image:repeating-linear-gradient(45deg,transparent 0 5px,rgba(0,0,0,.05) 5px 6px);}
/* 日ビュー 2カラム（左=予定 / 右=タスク） */
.daycols{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--ink);}
.daycol{border-right:1px solid var(--line2);min-width:0;}
.daycol:last-child{border-right:none;}
.dch{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;font-size:12px;letter-spacing:.1em;color:var(--sub);border-bottom:1px solid var(--line);}
.dch b{color:var(--ink);font-size:12.5px;}
.dch button{border:1px solid var(--line);width:26px;height:26px;font-size:16px;color:var(--ink);}
.tl{display:flex;gap:7px;padding:9px 9px;border-bottom:1px solid var(--line2);cursor:pointer;}
.tl .tlt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;flex:0 0 40px;}
.tl .tlt small{display:block;font-size:9px;color:var(--sub);font-weight:400;}
.tl .tlbar{width:3px;flex:0 0 3px;}
.tl .tlb{flex:1;min-width:0;}
.tl .tlname{font-size:13px;word-break:break-word;line-height:1.4;}
.tl .tlg{font-size:10px;color:var(--sub);}
.nightsep{font-size:10px;letter-spacing:.15em;color:#5457A6;background:#F1F1F9;padding:3px 10px;border-bottom:1px solid var(--line2);}
.dtask{display:flex;gap:7px;padding:9px 9px;border-bottom:1px solid var(--line2);align-items:flex-start;}
.dtask .cb{width:20px;height:20px;border:1.5px solid var(--ink);flex:0 0 20px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;}
.dtask.done .cb{background:var(--ink);}
.dtask .cb svg{width:13px;height:13px;stroke:#fff;stroke-width:2.5;fill:none;}
.dtask .dtb{flex:1;min-width:0;cursor:pointer;}
.dtask .dtn{font-size:13px;word-break:break-word;line-height:1.4;}
.dtask.done .dtn{text-decoration:line-through;color:var(--done);}
.dtask .dtm{font-size:10px;color:var(--sub);}
.dempty{padding:14px 10px;color:var(--line);font-size:12px;text-align:center;}
/* 設定 階層メニュー */
.setback{display:flex;align-items:center;gap:8px;padding:15px 16px;border-bottom:1px solid var(--ink);font-weight:700;letter-spacing:.05em;cursor:pointer;}
.setback .bk{font-size:20px;line-height:1;}
.setmenu .listrow{padding:16px;}

/* ========================= state ========================= */

/* 色系統パレット: 8系統×4階調（列＝系統、上から濃→淡） */
const PALETTE=(()=>{const F=[
 ['#1E4FD8','#4A78E8','#84A7F0','#BDD0F7'],  /* 青 */
 ['#1F7A46','#3E9E6A','#79C29A','#B8E0C9'],  /* 緑 */

 const flat=[];for(let s=0;s<4;s++)for(let f=0;f<8;f++)flat.push(F[f][s]);return flat;})();
const QUADS=[
 {t:'今すぐやる',s:'重要×緊急',c:'#C9403C'},

  </div>`;}
function tpCommit(id,h,m){const v=pad(h)+':'+pad(m);const el=$('#'+id);el.value=v;

const RAD=Math.PI/180;
function jdnOf(y,m,d){const a=Math.floor((14-m)/12),yy=y+4800-a,mm=m+12*a-3;

function newMoonJDE(k){const T=k/1236.85;
  let jde=2451550.09766+29.530588861*k+0.00015437*T*T;
  const E=1-0.002516*T;

  jde+= -0.40720*Math.sin(Mp)+0.17241*E*Math.sin(M)+0.01608*Math.sin(2*Mp)+0.01039*Math.sin(2*F)
    +0.00739*E*Math.sin(Mp-M)-0.00514*E*Math.sin(Mp+M)+0.00208*E*E*Math.sin(2*M)
    -0.00111*Math.sin(Mp-2*F)-0.00057*Math.sin(Mp+2*F)+0.00056*E*Math.sin(2*Mp+M)
    -0.00042*Math.sin(3*Mp)+0.00042*E*Math.sin(M+2*F)+0.00038*E*Math.sin(M-2*F)
    -0.00024*E*Math.sin(2*Mp-M)-0.00017*Math.sin(Om);
  return jde;}
const nmJdnCache={};
function newMoonJdnJST(k){if(nmJdnCache[k]===undefined)nmJdnCache[k]=Math.floor(newMoonJDE(k)+9/24+0.5);return nmJdnCache[k];}
function latestNewMoonK(jdn){let k=Math.floor((jdn-2451550)/29.5305888);

function chukiOfLunation(k){ // 中気→月番号 / なければ0(閏月)
  const a=newMoonJdnJST(k),b=newMoonJdnJST(k+1);

  for(let j=a;j<b;j++){const l2=sunLongAtMidnightJST(j+1);

function lunarOf(jdn){ // {m,d}

  for(let i=0;i<4;i++){m=chukiOfLunation(kk);if(m)break;kk--;} // 閏月は前月の数字

const ICHIRYU={1:[1,6],2:[9,2],3:[0,3],4:[3,4],5:[5,6],6:[9,6],7:[0,7],8:[3,8],9:[9,6],10:[9,10],11:[11,0],12:[3,0]};

/* 祝日 */
const holCache={};
function holidaysOf(y){
  if(holCache[y])return holCache[y];
  const H={};const add=(m,d,n)=>H[m+'-'+d]=n;
  const nthMon=(m,n)=>{const f=new Date(y,m-1,1).getDay();return 1+((8-f)%7)+(n-1)*7;};
  add(1,1,'元日');add(1,nthMon(1,2),'成人の日');add(2,11,'建国記念の日');add(2,23,'天皇誕生日');

function doItems(t){
  const rts=todaysRoutines(t),tks=todayTasks(t);
  const pool=new Map();
  rts.forEach(r=>pool.set('r_'+r.id,{type:'r',obj:r}));
  tks.forEach(x=>pool.set('t_'+x.id,{type:'t',obj:x}));
  const order=dayLog(t).doOrder||[];
  const res=[],seen=new Set();
  order.forEach(k=>{if(pool.has(k)){res.push(pool.get(k));seen.add(k);}});
  const rank=it=>it.type==='r'?({morning:0,day:1,night:2,any:3}[it.obj.slot]||0):10+(it.obj.priority||2);
  [...pool.keys()].filter(k=>!seen.has(k)).map(k=>pool.get(k)).sort((a,b)=>rank(a)-rank(b)).forEach(it=>res.push(it));
  res.sort((a,b)=>(flowItemDone(a)?1:0)-(flowItemDone(b)?1:0)); // 完了は一番下へ（安定ソート）
  return res;}

/* 4つの箱の操作 */
function qTap(id){qSel=qSel===id?null:id;render();}
function assignQuad(q){const x=S.tasks.find(t=>t.id===qSel);if(!x)return;
  x.quad=q;x.qOrder=Math.max(0,...S.tasks.filter(t=>t.quad===q&&t.id!==x.id).map(t=>t.qOrder+1));
  qSel=null;save();render();}
function unQuad(id){const x=S.tasks.find(t=>t.id===id);if(!x)return;x.quad=0;save();render();}
function moveQ(id,dir){const x=S.tasks.find(t=>t.id===id);if(!x)return;
  const list=S.tasks.filter(t=>t.quad===x.quad&&t.status!=='done').sort((a,b)=>a.qOrder-b.qOrder);
  list.forEach((t,i)=>t.qOrder=i);
  const i=list.findIndex(t=>t.id===id),j=i+dir;
  if(j<0||j>=list.length)return;
  list[i].qOrder=j;list[j].qOrder=i;save();render();}
let taskAnchorId=null;
function quickAddTask(){const v=$('#qaTask').value.trim();if(!v)return;
  const id=uid();
  S.tasks.push({id,title:v,groupId:$('#qaGroup').value,estMin:15,priority:2,status:'todo',links:[],due:'',today:null,memo:'',quad:0,qOrder:0,snooze:null,order:Date.now(),createdAt:todayStr()});
  if(taskSort==='manual'){let ids=manualTaskIds().filter(i=>i!==id);
    const ai=taskAnchorId?ids.indexOf(taskAnchorId):-1;
    if(ai>=0)ids.splice(ai+1,0,id);else ids.push(id);
    commitTaskOrder(ids);taskAnchorId=id;}
  save();render();}
/* ===== タスクタブ「手動」並び替え（選んだ順に番号／「決定」で先頭の番号の下にまとめる／▲▼で微調整） ===== */
let taskReorder=false,taskRSel=[];
function enterTaskReorder(){taskReorder=true;taskRSel=[];render();}
function exitTaskReorder(){taskReorder=false;taskRSel=[];render();}
function manualTaskIds(){return S.tasks.filter(x=>x.status!=='done')
  .sort((a,b)=>(a.torder??1e9)-(b.torder??1e9)||a.priority-b.priority||(a.due||'9999').localeCompare(b.due||'9999')).map(x=>x.id);}
function commitTaskOrder(ids){ids.forEach((id,i)=>{const x=S.tasks.find(t=>t.id===id);if(x)x.torder=i;});save();}
function tglTaskRSel(id){const i=taskRSel.indexOf(id);i>=0?taskRSel.splice(i,1):taskRSel.push(id);
  if(taskRSel.length)_reorderFollow=`[data-rk="${taskRSel[0]}"]`;render();}
function taskReorderHtml(list){
  return `<div class="mini">動かすタスクをタップ（選んだ順に番号）。<b>「決定」</b>で先頭の番号の下にまとめて並びます。▲▼は微調整用。</div>
  ${list.map(x=>{const n=taskRSel.indexOf(x.id);const isSel=n>=0;
    return `<div class="rrow ${isSel?'sel':''}" data-rk="${x.id}" onclick="tglTaskRSel('${x.id}')">
      <span class="rnum">${isSel?n+1:''}</span><span class="rttl">${esc(x.title)}</span></div>`;}).join('')}
  ${taskRSel.length?`<div class="reorderfab"><span>${taskRSel.length}件</span>
    <button onclick="moveTaskBlock(-1)">▲</button><button onclick="moveTaskBlock(1)">▼</button>
    <button class="decide" onclick="decideTask()">決定</button></div>`:''}`;}
function moveTaskBlock(dir){if(!taskRSel.length)return;let ids=manualTaskIds();
  const idx=taskRSel.map(id=>ids.indexOf(id)).filter(i=>i>=0).sort((a,b)=>a-b);
  for(let k=1;k<idx.length;k++)if(idx[k]!==idx[k-1]+1){toast('▲▼は連続したタスクのみ。バラバラのときは「決定」でまとめられます');return;}
  const lo=idx[0],hi=idx[idx.length-1];const block=ids.slice(lo,hi+1);
  if(dir<0){if(lo<=0)return;const above=ids[lo-1];ids.splice(lo-1,hi-lo+2,...block,above);}
  else{if(hi>=ids.length-1)return;const below=ids[hi+1];ids.splice(lo,hi-lo+2,below,...block);}
  _reorderFollow=`[data-rk="${taskRSel[0]}"]`;commitTaskOrder(ids);render();}
function decideTask(){const sel=taskRSel.slice();if(!sel.length)return;
  const orig=manualTaskIds();const anchorIdx=orig.indexOf(sel[0]);
  const before=orig.slice(0,anchorIdx).filter(id=>!sel.includes(id)).length;
  const rest=orig.filter(id=>!sel.includes(id));rest.splice(before,0,...sel);
  commitTaskOrder(rest);taskRSel=[];render();}
async function clearDone(){if(!await uiConfirm('完了済みタスクをすべて削除しますか？','削除'))return;
  S.tasks=S.tasks.filter(x=>x.status!=='done');save();render();}

/* ===== メモ内のURLを自動リンク化 ===== */
function linkify(text){if(!text)return '';
  return String(text).split(/(https?:\/\/[^\s]+)/g).map(p=>/^https?:\/\//.test(p)
    ?`<a href="${esc(p)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="memolink">${esc(p.length>44?p.slice(0,44)+'…':p)}</a>`
    :esc(p).replace(/\n/g,'<br>')).join('');}
/* ===== 画像メモ（撮影/選択→縮小してdataURLで保存） ===== */
let editImages=[];
function imagesEditorHtml(){return `<div id="imagesEd" class="imged">${editImages.map((u,i)=>`
  <div class="imgthumb"><img src="${u}" onclick="openLightbox(this.src)"><button type="button" onclick="editImages.splice(${i},1);refreshImagesEd()">✕</button></div>`).join('')}
  <label class="imgadd">＋<input type="file" accept="image/*" multiple style="display:none;" onchange="addImageFile(this)"></label></div>`;}
function refreshImagesEd(){const el=$('#imagesEd');if(el)el.outerHTML=imagesEditorHtml();}
function resizeImage(file,maxDim,cb){const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{URL.revokeObjectURL(url);let w=img.width,h=img.height;
    if(w>maxDim||h>maxDim){if(w>=h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    try{cb(c.toDataURL('image/jpeg',0.72));}catch(e){cb(null);}};
  img.onerror=()=>{URL.revokeObjectURL(url);cb(null);};img.src=url;}
function addImageFile(inp){const files=[...inp.files];inp.value='';
  files.forEach(f=>{if(!f.type.startsWith('image/'))return;
    resizeImage(f,1200,d=>{if(d){editImages.push(d);refreshImagesEd();}});});}

function taskModal(id,presetDue,presetToday){

function saveTask(id){
  const title=$('#tmTitle').value.trim();if(!title){uiAlert('タスク名を入力してください');return;}
  const quad=+($('#tmQuad button.on')?.dataset.q||0);
  const priority=quad===1?1:quad===4?3:2; // 4つの箱→並び用の優先度に変換
  snapUndo();const tv=$('#tmToday').value;const today=tv==='today'?todayStr():tv==='tomorrow'?tomorrowStr():null;
  const data={title,groupId:$('#tmGroup').value,estMin:+$('#tmEst').value||0,quad,priority,
    due:$('#tmDue').value,repeat:$('#tmRepeat').value,status:$('#tmSt').value,waitNote:$('#tmWait').value.trim(),
    today,memo:$('#tmMemo').value,links:collectLinks(),images:editImages.slice(),
    pin:$('#tmPin').checked};
  if(id){const old=S.tasks.find(t=>t.id===id);
    if(data.pin&&!old.pin)data.snooze=null;
    Object.assign(old,data);}
  else{const newId=uid();S.tasks.push({id:newId,...data,quad:0,qOrder:0,snooze:null,order:Date.now(),createdAt:todayStr()});
    if(taskAddAfter){taskSort='manual';let ids=manualTaskIds().filter(i=>i!==newId);
      const ai=ids.indexOf(taskAddAfter);if(ai>=0)ids.splice(ai+1,0,newId);else ids.push(newId);
      commitTaskOrder(ids);taskAddAfter=null;}}
  save();closeModal();render();flashUndo(id?'タスクを更新しました':'タスクを追加しました');}
async function delTask(id){if(!await uiConfirm('このタスクを削除しますか？','削除'))return;
  snapUndo();S.tasks=S.tasks.filter(t=>t.id!==id);save();closeModal();render();flashUndo('タスクを削除しました');}
function dupTask(id){const x=S.tasks.find(t=>t.id===id);if(!x)return;
  S.tasks.push({...JSON.parse(JSON.stringify(x)),id:uid(),title:x.title+'（コピー）',status:'todo',today:null,order:Date.now()});
  save();closeModal();render();}

function calNav(n){if(calMode==='month'){calX+=n;if(calX<0){calX=11;calY--;}if(calX>11){calX=0;calY++;}}
  else{const d=parseDs(calDate);d.setDate(d.getDate()+(calMode==='week'?7*n:n));calDate=dsOf(d);calY=d.getFullYear();calX=d.getMonth();}

function isNight(e){return !!(e.start&&S.settings.showNight&&e.start>=S.settings.nightStart);}
/* 時間帯（午前/午後/夜）。夜は「夜の開始〜翌日の起床まで」 */
function bandOf(t,wake){
  if(!t)return 'am';
  const m=hm2min(t),w=hm2min(wake||S.settings.wakeDef),p=hm2min(S.settings.pmStart),n=hm2min(S.settings.nightStart);
  if(m>=n||m<w)return 'night';
  if(m>=p)return 'pm';
  return 'am';}
function bandLabel(b){return b==='night'?`🌙 夜（${S.settings.nightStart}〜）`:b==='pm'?`🌤 午後（${S.settings.pmStart}〜）`:'☀ 午前';}
/* 昼＝山吹色 / 夜＝紫（予定の左端で昼夜を色分け） */
const DAY_COLOR='#E6A21C',NIGHT_COLOR='#7B5EC7';
function dnColor(startOrEvent){const t=typeof startOrEvent==='string'?startOrEvent:startOrEvent&&startOrEvent.start;
  if(!S.settings.showNight||!t)return '';return bandOf(t)==='night'?NIGHT_COLOR:DAY_COLOR;}
/* 起床起点の分（起床前の早朝は前日夜の続きとして最後に並べる） */
function dayMin(t,wake){if(!t)return -1;const m=hm2min(t),w=hm2min(wake||S.settings.wakeDef);return m<w?m+1440:m;}
/* 予定を午前/午後/夜の区切り付きタイムラインで表示（日ビュー・今日で共用） */
function scheduleListHtml(evs,wake){
  const sorted=[...evs].sort((a,b)=>dayMin(a.start,wake)-dayMin(b.start,wake));
  let cur=null,html='';
  sorted.forEach(e=>{const b=bandOf(e.start,wake);
    if(S.settings.showNight&&b!==cur){cur=b;html+=`<div class="nightsep ${b}">${bandLabel(b)}</div>`;}
    const bg=evColor(e),tc=evTextColor(bg);
    html+=`<div class="cev dcev${e.important?' imp':''}" style="background:${bg};color:${tc};border-left:${evLineW(e)}px solid ${evLine(e)};" onclick="eventTap('${e.id}')">
      ${e.repeat?`<span class="cevrep">${REFRESHI}</span>`:''}
      <div class="cevt">${evLabel(e)}</div>
      <div class="cevm" style="color:${tc};">${CLOCKI}${evTimeText(e)}　<span style="opacity:.85;">${esc(group(e.groupId).name)}</span></div>
      ${e.memo?`<div class="cevmemo" style="color:${tc};">${linkify(e.memo)}</div>`:''}${linkChips(e.links)}${rowImgs(e.images)}</div>`;});
  return html;}
function calGoto(dstr){calDate=dstr;calMode='day';const d=parseDs(dstr);calY=d.getFullYear();calX=d.getMonth();render();toTop();}
function eventsOn(d){const ids=visibleGroups(calSel);
  return S.events.filter(e=>eventOccursOn(e,d)&&(!ids||ids.has(e.groupId))).sort((a,b)=>(a.start||'').localeCompare(b.start||''));}
function dueTasksOn(d){if(!S.settings.showDue)return[];const ids=visibleGroups(calSel);
  return S.tasks.filter(x=>x.due===d&&x.status!=='done'&&(!ids||ids.has(x.groupId)));}
function marksOn(m,d){const out=[];
  S.birthdays.forEach(b=>{if(+b.month===m&&+b.day===d)out.push({icon:'cake',color:b.gift?(b.color||'#E8618C'):'#788091',name:b.name+'の誕生日'+(b.gift?'（プレゼント準備！）':''),gift:b.gift});});
  S.marks.forEach(k=>{if(+k.month===m&&+k.day===d)out.push({icon:k.icon,color:k.color,name:k.name});});
  return out;}

/* タスクの繰り返し：完了したら次回の日付へ送る（今日の記録に完了を残す） */
function nextTaskDate(fromDs,repeat){const d=parseDs(fromDs);
  if(repeat==='daily')d.setDate(d.getDate()+1);
  else if(repeat==='weekly')d.setDate(d.getDate()+7);
  else if(repeat==='monthly')d.setMonth(d.getMonth()+1);
  else return null;
  return dsOf(d);}
function advanceRepeatTask(x){if(!x.repeat)return false;
  const t=todayStr();const base=x.today||x.due||t;const nd=nextTaskDate(base,x.repeat);if(!nd)return false;
  const pd=parseDs(base);const md=(pd.getMonth()+1)+'/'+pd.getDate();
  const label=(base!==t)?`${x.title}（${md}分）`:x.title; // いつの分か分かるように
  dayLogs(t).push({id:uid(),kind:'done',text:label,at:curMin(),dur:0});
  x.status='todo';x.today=nd;if(x.due)x.due=nd;delete x.doneAt;delete x.doneMin;
  const at=dayLog(t).at;if(at)delete at['t_'+x.id];
  toast(`完了！${base!==t?`（${md}分）`:''}次回は ${fmtDateJa(nd)} に繰り返します🔁`);return true;}
function toggleTaskDone(id){const x=S.tasks.find(t=>t.id===id);if(!x)return;setAnchor('t_'+id);
  if(x.status==='done')x.status='todo';else{x.status='done';x.doneAt=todayStr();x.doneMin=curMin();sinkDoItem('t_'+id);advanceRepeatTask(x);}
  save();render();checkCelebrate();}
function dayScheduleHtml(dstr){

  const tl=scheduleListHtml(evs,wake);
  const tk=dtasks.map(x=>`<div class="dtask ${x.status==='done'?'done':''}">
    <div class="cb" onclick="event.stopPropagation();toggleTaskDone('${x.id}')">${x.status==='done'?'<svg viewBox="0 0 24 24"><path d="M4 12l5 5 11-11"/></svg>':''}</div>

/* その日の記録・流れ（予定・記録・完了タスク/ルーティンを時系列で） */
function dayRecordHtml(dstr){const dl=dayLog(dstr);const items=[];const canEdit=dstr===todayStr();
  eventsOn(dstr).forEach(e=>{if(e.start)items.push({at:hm2min(e.start),icon:'📅',text:evTitle(e),sub:evTimeText(e),c:evColor(e)});});

  if(!items.length)return '';

    ${items.map(it=>`<div class="drec${it.tok?' undoable':''}" ${it.logId&&canEdit?`onclick="logEditor('${it.logId}')"`:(it.tok?`onclick="undoneFromRecord('${it.tok}','${dstr}')"`:'')}>

function attachCellPress(){
  if(!pressDocBound){pressDocBound=true;
    document.addEventListener('pointermove',e=>{
      if(!pressTimer||!pressStart)return;
      if(Math.abs(e.clientX-pressStart[0])>10||Math.abs(e.clientY-pressStart[1])>10)endPressTimer();
    },{passive:true});
    document.addEventListener('pointerup',()=>{
      const had=!!pressTimer;endPressTimer();
      if(had&&pressCell&&!pressFired)openDayPopup(pressCell.dataset.d);
      pressCell=null;pressLp=null;pressStart=null;setTimeout(()=>{pressFired=false;},0);});
    document.addEventListener('pointercancel',()=>{endPressTimer();pressCell=null;pressLp=null;pressStart=null;});
    window.addEventListener('scroll',()=>endPressTimer(),{passive:true});
    document.addEventListener('click',e=>{if(lpSuppress){e.stopPropagation();e.preventDefault();lpSuppress=false;}},true);
  }
  const bind=(el,kind)=>{if(el._lp)return;el._lp=1;
    el.addEventListener('contextmenu',e=>e.preventDefault());
    el.addEventListener('pointerdown',e=>{
      if(e.pointerType==='mouse'&&e.button!==0)return;
      endPressTimer();pressFired=false;pressCell=kind==='cell'?el:null;pressLp=kind==='lp'?el:null;pressStart=[e.clientX,e.clientY];
      pressTimer=setTimeout(()=>{pressTimer=null;pressFired=true;
        try{navigator.vibrate&&navigator.vibrate(30);}catch(_){}
        if(kind==='cell')openColorSheet(el.dataset.d);
        else{lpSuppress=true;openItemColorSheet(el.dataset.lp);}},600);
    });};

let routineReorder=false,routineSel=new Set();
function routineOrderedList(){const order={morning:0,day:1,night:2,any:3};const folders=routineFolders();const fi=r=>folders.indexOf(r.folder||'マイルーティン');
  return [...S.routines].sort((a,b)=>fi(a)-fi(b)||order[a.slot]-order[b.slot]||a.order-b.order);}
let routineActiveRow=null,routineAddAfter=null;
function enterReorder(){routineReorder=true;routineSel=new Set();routineActiveRow=null;render();}
function exitReorder(){routineReorder=false;routineSel=new Set();render();}

function openRoutineEdit(id){routineActiveRow=null;routineModal(id);}
function enterReorderWith(id){routineActiveRow=null;routineReorder=true;routineSel=new Set([id]);render();}
function addRoutineAfter(id){routineActiveRow=null;routineAddAfter=id;const r=S.routines.find(x=>x.id===id);routineModal(null,r?r.slot:null);}
function placeRoutineAfter(newId,afterId){const nw=S.routines.find(r=>r.id===newId);if(!nw)return;
  const arr=S.routines.filter(r=>r.slot===nw.slot&&r.id!==newId).sort((a,b)=>a.order-b.order);
  const ai=arr.findIndex(r=>r.id===afterId);
  if(ai>=0)arr.splice(ai+1,0,nw);else arr.push(nw);
  arr.forEach((r,i)=>r.order=i);}
function validContig(sel,list){if(!sel.size)return true;
  const idxs=list.map((r,i)=>sel.has(r.id)?i:-1).filter(i=>i>=0).sort((a,b)=>a-b);
  const slot=list[idxs[0]].slot;
  if(!idxs.every(i=>list[i].slot===slot))return false;
  for(let k=1;k<idxs.length;k++)if(idxs[k]!==idxs[k-1]+1)return false;
  return true;}
function tglRoutineSel(id){const list=routineOrderedList();
  const cand=new Set(routineSel);cand.has(id)?cand.delete(id):cand.add(id);
  routineSel=validContig(cand,list)&&cand.size?cand:new Set([id]);
  if(routineSel.size)_reorderFollow=`[data-rk="${[...routineSel][0]}"]`;render();}
function moveRoutineBlock(dir){if(!routineSel.size)return;
  const r0=S.routines.find(r=>routineSel.has(r.id));
  const slotList=S.routines.filter(x=>x.slot===r0.slot).sort((a,b)=>a.order-b.order);
  slotList.forEach((x,i)=>x.order=i);
  const idx=slotList.map((x,i)=>routineSel.has(x.id)?i:-1).filter(i=>i>=0).sort((a,b)=>a-b);
  const lo=idx[0],hi=idx[idx.length-1];const block=slotList.slice(lo,hi+1);
  if(dir<0){if(lo<=0)return;const above=slotList[lo-1];slotList.splice(lo-1,hi-lo+2,...block,above);}
  else{if(hi>=slotList.length-1)return;const below=slotList[hi+1];slotList.splice(lo,hi-lo+2,below,...block);}
  slotList.forEach((x,i)=>x.order=i);_reorderFollow=`[data-rk="${[...routineSel][0]}"]`;save();render();}
let routineFilter=null; // null=すべて / 0-6=曜日 / 'daily'=毎日

    const row=`<div class="titem ${sel?'rsel':''} ${active?'ractive':''}" data-rk="${r.id}" ${routineReorder?'':`data-lp="r_${r.id}"`} onclick="${routineReorder?`tglRoutineSel('${r.id}')`:`setRoutineActive('${r.id}')`}" style="${sel||active?'':pastelBg(r)}">

      ${r.memo?`<div class="memoline">${linkify(r.memo)}</div>`:''}${linkChips(r.links)}${rowImgs(r.images)}</div></div>`;
    const actions=(!routineReorder&&active)?`<div class="ractions">

    return h+row+actions;}).join('')}
  ${routineReorder&&routineSel.size?`<div class="reorderfab"><span>${routineSel.size}件を移動</span>
    <button onclick="moveRoutineBlock(-1)">▲</button><button onclick="moveRoutineBlock(1)">▼</button></div>`:''}`;
}

function saveHabit(id){const name=$('#hmName').value.trim();if(!name){uiAlert('名前を入力してください');return;}

async function delHabit(id){if(!await uiConfirm('この習慣を削除しますか？（記録も消えます）','削除'))return;

/* ========================= おはようフロー ========================= */
let flowList=[],flowIdx=0,flowTimer=null,flowBase=0,flowSince=0,flowListOpen=false;
const FLOWKEY='homehub_flow';
function fmtWatch(ms){const s=Math.floor(ms/1000);return pad(Math.floor(s/60))+':'+pad(s%60);}
function flowElapsed(){return flowBase+(flowSince?Date.now()-flowSince:0);}
function flowItemDone(it){return it.type==='r'?!!dayLog(todayStr()).routines[it.obj.id]?.done:it.obj.status==='done';}
function flowPersist(){if(!flowList.length){localStorage.removeItem(FLOWKEY);return;}
  localStorage.setItem(FLOWKEY,JSON.stringify({date:todayStr(),items:flowList.map(it=>({type:it.type,id:it.obj.id})),idx:flowIdx,base:flowBase,since:flowSince}));}
function flowResolve(list){return list.map(o=>{const obj=o.type==='r'?S.routines.find(r=>r.id===o.id):S.tasks.find(x=>x.id===o.id);return obj?{type:o.type,obj}:null;}).filter(Boolean);}
/* タイムラインの順番＝配置済み(時刻順)→未配置(並び順)。フローもこの順で回す */
function timelineOrder(t){const at=(dayLog(t).at)||{};const tokOf=it=>it.type+'_'+it.obj.id;
  const live=doItems(t).filter(it=>!flowItemDone(it));
  const placed=live.filter(it=>at[tokOf(it)]!=null).sort((a,b)=>at[tokOf(a)]-at[tokOf(b)]);
  const rest=live.filter(it=>at[tokOf(it)]==null);
  return [...placed,...rest];}
function startFlow(){
  const t=todayStr();
  flowList=timelineOrder(t).map(it=>({type:it.type,obj:it.obj}));
  if(!flowList.length){uiAlert('今日やることはすべて完了しています🎉');return;}
  flowIdx=0;flowBase=0;flowSince=Date.now();flowListOpen=false;$('#flow').classList.add('show');flowShow(true);}
function flowRestore(){try{const f=JSON.parse(localStorage.getItem(FLOWKEY)||'null');
  if(!f||f.date!==todayStr())return;
  const items=f.items||(f.ids?f.ids.map(id=>({type:'r',id})):[]);
  flowList=flowResolve(items);
  if(!flowList.length){localStorage.removeItem(FLOWKEY);return;}
  flowIdx=Math.min(f.idx||0,flowList.length-1);flowBase=f.base||0;flowSince=f.since||0;
  $('#flow').classList.add('show');flowShow(true);}catch(e){}}
function flowShow(keep){
  const it=flowList[flowIdx];const r=it.obj;const isR=it.type==='r';if(!keep){flowBase=0;flowSince=Date.now();}
  flowPersist();
  const st=r.stats||{n:0,total:0};const t=todayStr();
  const rem=flowList.slice(flowIdx).filter(x=>!flowItemDone(x));
  const remEst=rem.reduce((s,x)=>s+(+x.obj.estMin||0),0);
  const now=new Date();const bed=Math.max(0,hm2min(daySleep(t))-(now.getHours()*60+now.getMinutes()));
  const paused=!flowSince;const doneNow=flowItemDone(it);
  const label=isR?`${SLOTS[r.slot]}のルーティン${r.optional?' ・<span style="color:#D8B65A;">時間があれば</span>':''}`:`タスク ・${esc(groupPath(r.groupId))}`;
  const meta=isR?`目安 ${fmtMin(r.estMin)}${st.n?`　／　平均 ${fmtMin(st.total/st.n/60)}`:''}`:`目安 ${fmtMin(r.estMin)}${r.due?`　／　期限 ${fmtDateJa(r.due)}`:''}`;
  $('#flow').innerHTML=`
    <div class="fh"><span>${flowIdx+1} / ${flowList.length}${doneNow?' ・完了済み':''}</span>
      <span><button onclick="flowToggleList()">${flowListOpen?'⏱ 実行に戻る':'☰ 一覧'}</button><button onclick="flowMinimize()">最小化 ⌄</button><button onclick="flowClose()">終了 ✕</button></span></div>
    <div class="fstats"><span>残り <b>${rem.length}</b>件・目安 <b>${fmtMin(remEst)}</b></span><span>就寝まで <b>${fmtMin(bed)}</b></span></div>
    <div class="fmain">
      ${flowListOpen?flowListHtml():`
      <div class="slot">${label}</div>
      <div class="rname" id="frname">${esc(r.title)}<button class="fedit" onclick="flowEdit()">✎</button></div>
      <div class="rmeta" id="frmeta">${meta}</div>
      ${isR&&r.memo?`<div class="fmemo">${linkify(r.memo)}</div>`:''}
      ${r.images&&r.images.length?`<div class="rowimgs" style="justify-content:center;">${r.images.map(u=>`<a href="${u}" target="_blank" rel="noopener"><img src="${u}" style="width:56px;height:56px;"></a>`).join('')}</div>`:''}
      <div class="watch ${paused?'paused':''}" id="fwatch">${fmtWatch(flowElapsed())}</div>
      <button class="fpause" onclick="flowPause()" title="${paused?'再開':'一時停止'}">${paused?'▶':'❚❚'}</button>
      ${paused?'<div class="fpausetag">一時停止中</div>':''}
      ${r.links?.length?`<div class="flinks">${r.links.map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener">↗ ${esc(l.label)}</a>`).join('')}</div>`:''}
      ${(()=>{const up=flowList.slice(flowIdx+1,flowIdx+4);return up.length
        ?`<div class="fnext"><div class="fnexth">つぎ（タップでそこへ）</div>${up.map((x,k)=>`<div class="fnexti" onclick="flowJump(${flowIdx+1+k})">${x.type==='r'?'🔁':'📋'} ${esc(x.obj.title)}${x.type==='r'&&x.obj.optional?' <span style="color:#D8B65A;">（時間があれば）</span>':''}</div>`).join('')}</div>`
        :'<div class="fnext"><div class="fnexth">これで最後です</div></div>';})()}`}
    </div>
    <div class="fbtns2">
      <button onclick="flowPrev()" ${flowIdx===0?'disabled style="opacity:.35"':''}>◀ 前へ</button>
      <button onclick="flowHardSkip()">次へスキップ ▶</button>
    </div>
    <div class="fbtns3"><button onclick="flowLog()">＋ 別のことを記録</button><button onclick="flowManualDone()">⌨ 手動で完了</button></div>
    <div class="fbtns"><button class="ok" onclick="flowDone()">${doneNow?'次へ →':'完了 → 次へ'}</button></div>`;
  clearInterval(flowTimer);
  flowTimer=setInterval(()=>{const el=$('#fwatch');if(el&&flowSince)el.textContent=fmtWatch(flowElapsed());},250);}
function flowPause(){if(flowSince){flowBase+=Date.now()-flowSince;flowSince=0;}else{flowSince=Date.now();}flowPersist();flowShow(true);}
function flowMinimize(){clearInterval(flowTimer);$('#flow').classList.remove('show');flowPersist();render();}
function flowResume(){if(!flowList.length)return;$('#flow').classList.add('show');flowShow(true);}
function flowListHtml(){const t=todayStr();return `<div class="flist">${flowList.map((it,i)=>{const done=flowItemDone(it);const cur=i===flowIdx;const dm=done?doneMinOf(it,t):null;
  return `<div class="fli ${cur?'cur':''} ${done?'done':''}">
    <span class="flic" onclick="flowJump(${i})">${done?'✓':cur?'▶':'○'}</span>
    <span class="flit" onclick="flowJump(${i})">${it.type==='r'?'🔁':'📋'} ${esc(it.obj.title)}${it.type==='r'&&it.obj.optional?' <span style="color:#D8B65A;font-size:11px;">（時間があれば）</span>':''}</span>
    <span class="flie">${done?(dm!=null?'完了 '+min2hm(dm):'完了'):fmtMin(it.obj.estMin)}${it.obj.links?.length?' 🔗':''}</span>
    <span class="fliar"><button onclick="flowMoveItem(${i},-1)">▲</button><button onclick="flowMoveItem(${i},1)">▼</button></span></div>`;}).join('')}
  <button class="flireorder" onclick="flowGotoRoutineReorder()">ルーティンタブでまとめて並び替え →</button></div>`;}
function flowMoveItem(i,dir){const j=i+dir;if(j<0||j>=flowList.length)return;
  [flowList[i],flowList[j]]=[flowList[j],flowList[i]];
  if(flowIdx===i)flowIdx=j;else if(flowIdx===j)flowIdx=i;
  flowPersist();flowShow(true);}
function flowGotoRoutineReorder(){flowMinimize();switchView('routine');enterReorder();}
function flowToggleList(){flowListOpen=!flowListOpen;flowShow(true);}
function flowJump(i){flowListOpen=false;if(i!==flowIdx){flowIdx=i;flowBase=0;flowSince=Date.now();}flowPersist();flowShow(true);}
function flowEdit(){const it=flowList[flowIdx];const r=it.obj;editLinks=(r.links||[]).map(l=>({...l}));
  $('#dlg').innerHTML=`<div class="dm" style="text-align:left;max-height:64vh;overflow:auto;">${it.type==='r'?'ルーティン':'タスク'}を編集
    <label style="font-size:12px;color:var(--sub);display:block;margin-top:8px;">名前</label><input id="feName" value="${esc(r.title)}">
    <label style="font-size:12px;color:var(--sub);display:block;margin-top:8px;">目安（分）</label><input id="feEst" type="number" inputmode="numeric" min="0" value="${r.estMin}">
    <label style="font-size:12px;color:var(--sub);display:block;margin-top:8px;">リンク（フロー中にここから開けます）</label>${linksEditorHtml()}</div>
    <div class="db"><button onclick="dlgEnd()">閉じる</button><button class="ok" onclick="applyFlowEdit()">保存</button></div>`;
  $('#dlgWrap').classList.add('show');setTimeout(()=>$('#feName')?.focus(),80);}
function applyFlowEdit(){const r=flowList[flowIdx].obj;r.title=$('#feName').value.trim()||r.title;r.estMin=+$('#feEst').value||0;r.links=collectLinks();save();dlgEnd();flowShow(true);}
function completeCurrentFlow(sec,dmin){
  const it=flowList[flowIdx];const r=it.obj;const tok=it.type+'_'+r.id;const dm=dmin!=null?dmin:curMin();
  if(it.type==='r'){const st=r.stats||{n:0,total:0};const prevAvg=st.n?st.total/st.n:null;
    dayLog(todayStr()).routines[r.id]={done:true,sec,doneMin:dm};r.stats={n:st.n+1,total:st.total+sec};
    if(prevAvg!==null&&sec>0){if(sec<=prevAvg*0.92)toast('⤴ 好調！平均より '+fmtMin((prevAvg-sec)/60)+' 速い');else if(sec>=prevAvg*1.15)toast('💪 次はもっといけるよ');}
  }else{r.status='done';r.doneAt=todayStr();r.doneMin=dm;}
  sinkDoItem(tok);save();flowAdvance();}
function flowDone(){completeCurrentFlow(Math.round(flowElapsed()/1000),curMin());}
function flowManualDone(){const it=flowList[flowIdx];const r=it.obj;
  const mins=Math.max(0,Math.round(flowElapsed()/60000));
  $('#dlg').innerHTML=`<div class="dm" style="text-align:left;">「${esc(r.title)}」を手動で完了
    <label style="font-size:12px;color:var(--sub);display:block;margin:8px 0 4px;">かかった時間（分）</label>
    <input id="fmMin" class="bigmin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4" value="${mins||''}" placeholder="例）25" onfocus="this.select()">
    <div class="minchips">${[2,4,6,8,10,15,20,30,45,60].map(n=>`<button type="button" onclick="$('#fmMin').value=${n};$('#fmMin').focus()">${n}分</button>`).join('')}</div>
    <label style="font-size:12px;color:var(--sub);display:block;margin:10px 0 4px;">完了した時刻</label>${timeInput('fmTime',min2hm(curMin()))}</div>
    <div class="db"><button onclick="dlgEnd()">やめる</button><button class="ok" onclick="saveManualDone()">完了にする</button></div>`;
  $('#dlgWrap').classList.add('show');setTimeout(()=>{const v=$('#fmMin');if(v){v.focus();v.select();}},120);}
function saveManualDone(){const min=parseInt($('#fmMin').value,10)||0;const hm=$('#fmTime')?.value;const dmin=hm?hm2min(hm):curMin();dlgEnd();completeCurrentFlow(min*60,dmin);}
function flowAdvance(){flowIdx++;
  if(flowIdx>=flowList.length){flowClose();return celebrateIfAll();}
  flowBase=0;flowSince=Date.now();flowPersist();flowShow(true);}
function flowPrev(){if(flowIdx<=0)return;flowIdx--;flowBase=0;flowSince=Date.now();flowPersist();flowShow(true);}
function flowDefer(){if(flowList.length<=1){toast('これで最後です');return;}
  const it=flowList.splice(flowIdx,1)[0];flowList.push(it);
  if(flowIdx>=flowList.length)flowIdx=0;
  flowBase=0;flowSince=Date.now();flowPersist();flowShow(true);}
function flowHardSkip(){flowAdvance();}
function celebrateIfAll(){render();checkCelebrate();}
function flowClose(){clearInterval(flowTimer);flowList=[];flowListOpen=false;localStorage.removeItem(FLOWKEY);$('#flow').classList.remove('show');render();}
function flowLog(){
  const routines=[...S.routines].filter(r=>r.active);
  $('#dlg').innerHTML=`<div class="dm" style="text-align:left;">別のことをした記録

    <select id="flName" onchange="if(this.value)$('#flFree').value=''"><option value="">— 自由入力にする —</option>${routines.map(r=>`<option value="${r.id}">${esc(r.title)}</option>`).join('')}</select>
    <label style="font-size:12px;color:var(--sub);display:block;margin-top:8px;">または名前を自由入力</label>
    <input id="flFree" placeholder="例）電話対応">
    <label style="font-size:12px;color:var(--sub);display:block;margin-top:8px;">かかった時間（時:分・4桁テンキー）</label>
    ${timeField('flTime','')}</div>
    <div class="db"><button onclick="dlgEnd()">やめる</button><button class="ok" onclick="saveFlowLog()">記録する</button></div>`;
  $('#dlgWrap').classList.add('show');setTimeout(()=>$('#flFree')?.focus(),80);}
function saveFlowLog(){
  const rid=$('#flName').value;const free=$('#flFree').value.trim();
  const hm=$('#flTime').value;const sec=hm?hm2min(hm)*60:0;
  if(!rid&&!free){toast('ルーティンを選ぶか、名前を入力してください');return;}
  const t=todayStr();
  if(rid){const r=S.routines.find(x=>x.id===rid);const st=r.stats||{n:0,total:0};
    dayLog(t).routines[rid]={done:true,sec};r.stats={n:st.n+1,total:st.total+sec};
    const i=flowList.findIndex(it=>it.type==='r'&&it.obj.id===rid);
    if(i>=0){flowList.splice(i,1);if(i<flowIdx)flowIdx--;if(flowIdx>=flowList.length)flowIdx=Math.max(0,flowList.length-1);}
  }else{const id=uid();
    S.tasks.push({id,title:free,groupId:(S.groups.find(g=>g.id==='g_personal')||S.groups[0]).id,estMin:Math.round(sec/60),priority:2,quad:0,qOrder:0,status:'done',doneAt:t,today:t,snooze:null,links:[],due:'',memo:'',order:Date.now(),createdAt:t});}
  save();dlgEnd();
  if(flowList.length&&$('#flow').classList.contains('show'))flowShow(true);else render();
  toast('記録しました（'+fmtMin(sec/60)+'）');}

function toggleNotify(el){
  if(!S.settings.notifyOn){
    if(!('Notification'in window)){uiAlert('この環境は通知に対応していません');return;}
    Notification.requestPermission().then(p=>{
      if(p==='granted'){S.settings.notifyOn=true;save();render();new Notification('くらしタスク',{body:'通知をオンにしました'});}
      else uiAlert('ブラウザの通知が許可されませんでした');});
  }else{S.settings.notifyOn=false;save();render();}}
async function sendNotes(){const memo=(S.notes||'').trim();
  if(!memo){uiAlert('メモが空です。先に改善メモを書いてください。');return;}
  const d=new Date();
  if(S.settings.feedbackUrl){
    try{
      await fetch(S.settings.feedbackUrl,{method:'POST',mode:'no-cors',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'feedback',type:'改善要望',content:memo,
          contact:S.settings.notifyEmail,sentAt:d.toISOString()})});
      S.notes='';save();render();
      uiAlert('送信しました📮 Notionの改善DBに記録され、Gmailにも通知が届きます。');
    }catch(e){uiAlert('送信に失敗しました。ネット接続を確認するか、後でもう一度お試しください。');}
  }else{
    location.href='mailto:'+encodeURIComponent(S.settings.notifyEmail)
      +'?subject='+encodeURIComponent(`【くらしタスク】改善メモ ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`)
      +'&body='+encodeURIComponent(memo);}}

function linkModal(id){const l=id?S.links.find(x=>x.id===id):null;
  openModal(`<div class="mh"><b>リンク</b><button onclick="closeModal()">✕</button></div>
  <div class="mbody">

    <div class="frow"><label>URL</label><input id="lkUrl" value="${esc(l?.url||'')}" placeholder="https://…"></div>
  </div>
  <div class="mbtns">${l?`<button class="del" onclick="delLink('${l.id}')">削除</button>`:''}
    <button class="save" onclick="saveLink('${l?.id||''}')">保存</button></div>`);}
function saveLink(id){const url=$('#lkUrl').value.trim();if(!url){uiAlert('URLを入力してください');return;}
  const label=$('#lkLabel').value.trim()||url.replace(/^https?:\/\//,'').slice(0,24);
  const data={label,url};
  if(id)Object.assign(S.links.find(x=>x.id===id),data);else S.links.push({id:uid(),...data});
  save();linkList();render();}
async function delLink(id){if(!await uiConfirm('このリンクを削除しますか？','削除'))return;
  S.links=S.links.filter(x=>x.id!==id);save();linkList();render();}
function firstUnusedHue(){const used=new Set(S.groups.map(g=>groupHue(g.id)));for(let i=0;i<HUES12.length;i++)if(!used.has(i))return i;return 0;}
function groupTreeFlat(){const flat=[];const walk=(g,dep)=>{flat.push({g,dep});S.groups.filter(x=>x.parentId===g.id).forEach(c=>walk(c,dep+1));};
  S.groups.filter(g=>!g.parentId).forEach(g=>walk(g,0));return flat;}
function moveGroup(id,dir){const g=S.groups.find(x=>x.id===id);if(!g)return;
  const sibs=S.groups.filter(x=>(x.parentId||null)===(g.parentId||null));
  const si=sibs.indexOf(g),sj=si+dir;if(sj<0||sj>=sibs.length)return;
  const other=sibs[sj];const ai=S.groups.indexOf(g),aj=S.groups.indexOf(other);
  [S.groups[ai],S.groups[aj]]=[S.groups[aj],S.groups[ai]];save();groupList();render();}

    <button class="addlink" style="margin-bottom:8px;" onclick="groupModal(null)">＋ グループを追加（最上位）</button>
    <div class="grouptree">
    ${groupTreeFlat().map(({g,dep})=>{const h=HUE(groupHue(g.id));const line=HUE(rootHueOf(g.id)).v;
      return `<div class="grow" style="padding-left:${4+dep*18}px;">
        ${dep?`<span class="gline" style="background:${line}"></span>`:''}
        <span class="gchip" style="background:${h.p};box-shadow:inset 0 0 0 2px ${h.v};" onclick="groupModal('${g.id}')"></span>
        <span class="gname" onclick="groupModal('${g.id}')">${esc(g.name)}</span>
        <span class="gacts"><button onclick="moveGroup('${g.id}',-1)">▲</button><button onclick="moveGroup('${g.id}',1)">▼</button><button class="addc" onclick="addChildGroup('${g.id}')">＋子</button></span>

  </div>`);}

function saveGroup(id){
  const name=$('#gmName').value.trim();if(!name){uiAlert('名前を入力してください');return;}
  const parentId=$('#gmParent').value||null;
  if(id&&parentId){let p=parentId;while(p){if(p===id){uiAlert('自分自身の下には移動できません');return;}p=S.groups.find(x=>x.id===p)?.parentId;}}
  const hueBtn=$('#gmColor button.on');const hue=hueBtn?+hueBtn.dataset.h:0;
  if(id)Object.assign(S.groups.find(x=>x.id===id),{name,parentId,hue});
  else S.groups.push({id:uid(),name,parentId,hue});
  save();groupList();render();}
async function delGroup(id){
  const kids=S.groups.some(g=>g.parentId===id);
  const used=S.tasks.some(t=>t.groupId===id)||S.events.some(e=>e.groupId===id);
  if(kids){uiAlert('先に下の階層のグループを削除してください');return;}
  if(!await uiConfirm(used?'このグループのタスク・予定は最初のグループに移動します。削除しますか？':'このグループを削除しますか？','削除'))return;
  const fb=S.groups.find(g=>g.id!==id)?.id;
  S.tasks.forEach(t=>{if(t.groupId===id)t.groupId=fb;});
  S.events.forEach(e=>{if(e.groupId===id)e.groupId=fb;});
  S.groups=S.groups.filter(g=>g.id!==id);save();groupList();render();}

function importData(inp){const f=inp.files[0];if(!f)return;

/* ===== 日付の切り替わり：昨日のタイムライン並びをルーティンに反映するか確認 ===== */
function routineSeqOf(dstr){const at=(dayLog(dstr).at)||{};const tokOf=it=>'r_'+it.obj.id;
  const items=doItems(dstr).filter(it=>it.type==='r');
  const placed=items.filter(it=>at[tokOf(it)]!=null).sort((a,b)=>at[tokOf(a)]-at[tokOf(b)]);
  const rest=items.filter(it=>at[tokOf(it)]==null);
  return [...placed,...rest].map(it=>it.obj.id);}
function routineArrangeChanged(dstr){const dl=dayLog(dstr);if(!dl)return false;
  const seq=routineSeqOf(dstr).filter(id=>S.routines.some(r=>r.id===id));if(seq.length<2)return false;
  const bySlot={};seq.forEach(id=>{const r=S.routines.find(x=>x.id===id);if(!r)return;(bySlot[r.slot]=bySlot[r.slot]||[]).push(id);});
  for(const slot in bySlot){const cur=S.routines.filter(r=>r.slot===slot).sort((a,b)=>a.order-b.order).map(r=>r.id).filter(id=>bySlot[slot].includes(id));
    if(cur.join(',')!==bySlot[slot].join(','))return true;}
  return false;}
function applyDayOrderToRoutines(dstr){const seq=routineSeqOf(dstr);
  ['morning','day','night','any'].forEach(slot=>{
    const inSlot=S.routines.filter(r=>r.slot===slot);
    inSlot.sort((a,b)=>{const ia=seq.indexOf(a.id),ib=seq.indexOf(b.id);return (ia<0?9e9:ia)-(ib<0?9e9:ib);});
    inSlot.forEach((r,i)=>r.order=i);});
  save();}
async function checkDayRollover(){const today=todayStr();const last=S.lastActiveDay;S.lastActiveDay=today;save();
  if(!last||last>=today)return;
  if(!routineArrangeChanged(last))return;
  const md=parseDs(last);
  if(await uiConfirm(`${md.getMonth()+1}/${md.getDate()}のタイムラインで、ルーティンの順番を並べ替えました。\nこの並び順を「ルーティン」タブの標準の並びにも反映しますか？`,'反映する')){
    applyDayOrderToRoutines(last);render();toast('ルーティンの並びを更新しました');}}
/* ===== 就寝時刻以降に開いたら、次の日の起床・就寝を設定するポップ ===== */
function isPastBedtime(){const t=todayStr();const now=curMin();const wake=hm2min(dayWake(t)),sleep=hm2min(daySleep(t));
  return sleep>wake?(now>=sleep||now<wake):(now>=sleep&&now<wake);}
function nextMorningDay(){const now=curMin();const wake=hm2min(dayWake(todayStr()));
  return now<wake?todayStr():tomorrowStr();}
function checkBedtimePlan(){if($('#modalWrap').classList.contains('show'))return;
  if(!isPastBedtime())return;const day=nextMorningDay();if(S._bedPlanFor===day)return;
  bedtimePlanModal(day);}
function bedtimePlanModal(day){const d=parseDs(day);const md=`${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）`;
  openModal(`<div class="mh"><b>🌙 ${md}の準備</b><button onclick="closeBedPlan('${day}')">✕</button></div>
    <div class="mbody">
      <div class="mini" style="padding:0 0 10px;">就寝時刻を過ぎています。<b>${md}の起床・就寝</b>を決めておくと、明日のタイムラインの見通しが立ちます。</div>
      <div class="frow f2"><div><label>起床</label>${timeInput('bpWake',dayWake(day))}</div>
        <div><label>就寝</label>${timeInput('bpSleep',daySleep(day))}</div></div>
    </div>
    <div class="mbtns"><button onclick="closeBedPlan('${day}')">あとで</button><button class="save" onclick="saveBedPlan('${day}')">これで設定</button></div>`);}
function saveBedPlan(day){const w=$('#bpWake').value||S.settings.wakeDef,s=$('#bpSleep').value||S.settings.sleepDef;
  const dl=dayLog(day);dl.wake=w;dl.sleep=s;S._bedPlanFor=day;save();closeModal();render();toast('起床・就寝を設定しました🌙');}
function closeBedPlan(day){S._bedPlanFor=day;save();closeModal();}
/* ========================= 起動 ========================= */
load();save();
switchView('today');
flowRestore();
checkDayRollover().then(()=>checkBedtimePlan());
if(syncReady())pullState();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')checkDayRollover().then(()=>checkBedtimePlan());});
